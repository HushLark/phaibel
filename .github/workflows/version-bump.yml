name: Version Bump & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # required for npm Trusted Publishing (OIDC) — tokenless auth

jobs:
  bump-and-publish:
    # Skip if the last commit was from this workflow (prevents infinite loops)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Node 24 ships npm 11.x (OIDC trusted publishing needs >= 11.5.1; Node 22
      # ships npm 10). No registry-url on purpose — it writes an .npmrc with a
      # "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" line that shadows
      # the OIDC flow. npm defaults to npmjs anyway.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Commit and push
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push

      - run: npm ci

      - run: npm run build

      # Belt-and-suspenders: guarantee >= 11.5.1 even if the Node image lags,
      # and log the versions so the run proves which npm did the publish.
      - name: Ensure OIDC-capable npm
        run: |
          npm install -g npm@latest
          echo "node $(node --version) / npm $(npm --version)"

      # Tokenless: npm authenticates via the GitHub OIDC id-token, matched to
      # the Trusted Publisher configured on npmjs (hushlark/phaibel →
      # version-bump.yml). No NPM_TOKEN secret needed; provenance is automatic.
      - name: Publish to npm (Trusted Publisher / OIDC)
        run: npm publish
