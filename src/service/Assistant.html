<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Phaibel — Executive AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/marked@15.0.12/marked.min.js" crossorigin="anonymous"></script>

<style>
  :root {
    /* Deep navy + warm ivory executive palette */
    --ink:        #0E1B2C;   /* deep navy - primary */
    --ink-2:      #16283F;   /* navy-2 */
    --ink-3:      #233A55;   /* navy-3 */
    --paper:      #F5EFE4;   /* warm ivory */
    --paper-2:    #EFE7D7;   /* ivory-2 */
    --paper-3:    #E6DBC5;   /* ivory-3 edge */
    --line:       #D8CDB4;   /* hairline on ivory */
    --line-ink:   #1E3148;   /* hairline on navy */
    --muted:      #6B6352;   /* warm taupe text */
    --muted-2:    #958B74;
    --gold:       #B8964E;   /* muted gold accent */
    --gold-soft:  #D9BE84;
    --oxblood:    #8B3A3A;   /* alert / overdue */
    --sage:       #5B7A5E;   /* done / positive */

    --radius:     5px;
    --radius-sm:  3px;
    --radius-lg:  8px;

    --shadow-sm: 0 1px 0 rgba(14,27,44,.04), 0 1px 2px rgba(14,27,44,.05);
    --shadow-md: 0 1px 0 rgba(14,27,44,.04), 0 6px 20px -10px rgba(14,27,44,.18);

    --font-serif: "Source Serif 4", ui-serif, Georgia, serif;
    --font-sans:  "Inter", ui-sans-serif, system-ui, sans-serif;
    --font-mono:  "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  button { font-family: inherit; color: inherit; }

  /* subtle warm paper grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(14,27,44,.025) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: multiply;
    opacity: .5;
    z-index: 0;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="application/json" id="tweak-defaults">
</script>

<script type="text/babel" data-presets="react">
/* ============================================================
   TWEAKS — default config (persisted via __edit_mode_set_keys)
   ============================================================ */
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "navy",
  "density": "balanced",
  "radius": 5,
  "typePair": "serif-sans",
  "micActive": false
}/*EDITMODE-END*/;

/* ============================================================
   DATA — loaded live from the service
   ============================================================ */
const PIN_STORAGE_KEY = 'assistant_pinboard';

function loadStoredPins() {
  try { return JSON.parse(localStorage.getItem(PIN_STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveStoredPins(pins) {
  try { localStorage.setItem(PIN_STORAGE_KEY, JSON.stringify(pins)); } catch {}
}

function ymd(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); } catch { return ''; }
}
function fmtHHMM(d) {
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function buildTimelineGroups(calItems) {
  const today = new Date();
  const dates = [0,1,2].map(i => ymd(addDays(today, i)));
  const todayStr = dates[0];
  const overdue = [], buckets = { [dates[0]]:[], [dates[1]]:[], [dates[2]]:[] };

  for (const ci of calItems) {
    const date = (ci.date || '').slice(0, 10);
    const isValidDate = /^\d{4}-\d{2}-\d{2}$/.test(date);
    if (ci.entityType === 'task') {
      if (ci.meta && (ci.meta.status === 'done' || ci.meta.status === 'completed')) continue;
      const item = { t: ci.title, kind: 'todo', time: ci.meta?.startDate ? fmtTime(ci.meta.startDate) : null };
      if (!isValidDate || date === todayStr) { buckets[dates[0]].push(item); }
      else if (date < todayStr) { overdue.push(item); }
      else if (buckets[date]) { buckets[date].push(item); }
    } else if (ci.entityType === 'event') {
      if (!isValidDate) continue;
      const item = { t: ci.title, kind: 'meeting', time: ci.meta?.startDate ? fmtTime(ci.meta.startDate) : null };
      if (date < todayStr) { overdue.push(item); }
      else if (buckets[date]) { buckets[date].push(item); }
    } else {
      if (!isValidDate) continue;
      const item = { t: ci.title, kind: 'milestone' };
      if (date < todayStr) { overdue.push(item); }
      else if (buckets[date]) { buckets[date].push(item); }
    }
  }

  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const fmt = (d) => {
    const dt = new Date(d + 'T12:00:00');
    return dt.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  };
  const groups = [];
  if (overdue.length) groups.push({ key:'overdue', label:'Overdue', sub:`${overdue.length} item${overdue.length===1?'':'s'}`, tone:'alert', items: overdue });
  groups.push({ key:'today',    label:'Today',    sub: fmt(dates[0]), tone:'accent', items: buckets[dates[0]] });
  groups.push({ key:'day1',     label: DAY_NAMES[addDays(today,1).getDay()], sub: fmt(dates[1]), tone:'', items: buckets[dates[1]] });
  groups.push({ key:'day2',     label: DAY_NAMES[addDays(today,2).getDay()], sub: fmt(dates[2]), tone:'', items: buckets[dates[2]] });
  return groups;
}

/* ============================================================
   ROOT
   ============================================================ */
const { useState, useEffect, useRef, useMemo } = React;

function App() {
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [pinboard, setPinboard] = useState(loadStoredPins);
  const [input, setInput] = useState("");
  const [micActive, setMicActive] = useState(tweaks.micActive);
  const [thinking, setThinking] = useState(false);
  const [thinkingStatus, setThinkingStatus] = useState("Thinking…");
  const [activeTab, setActiveTab] = useState("chat");
  const [calItems, setCalItems] = useState([]);
  const [wsConnected, setWsConnected] = useState(false);
  const [agentName, setAgentName] = useState("Phaibel");
  const [userName, setUserName] = useState("");
  const threadRef = useRef(null);
  const wsRef = useRef(null);

  // Edit-mode wiring
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  // Fetch calendar data and agent status
  useEffect(() => {
    fetch('/api/calendar').then(r => r.json()).then(setCalItems).catch(() => {});
    fetch('/api/status').then(r => r.json()).then(d => {
      if (d.agentName) setAgentName(d.agentName);
      if (d.userName) setUserName(d.userName);
    }).catch(() => {});
  }, []);

  // Persist pins
  useEffect(() => { saveStoredPins(pinboard); }, [pinboard]);

  // WebSocket
  useEffect(() => {
    let ws, reconnectTimer;
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host);
      wsRef.current = ws;
      ws.onopen = () => setWsConnected(true);
      ws.onclose = () => { setWsConnected(false); reconnectTimer = setTimeout(connect, 3000); };
      ws.onmessage = (ev) => {
        let msg; try { msg = JSON.parse(ev.data); } catch { return; }
        const now = fmtHHMM(new Date());
        switch (msg.type) {
          case 'chat.thinking':
            setThinkingStatus(msg.status || 'Thinking…');
            setThinking(true);
            break;
          case 'chat.response':
            setThinking(false);
            setMessages(m => [...m, { id: `m-${randId()}`, role:'assistant', text: msg.message||'', at: now, tokens: msg.totalTokens||0 }]);
            break;
          case 'chat.error':
            setThinking(false);
            setMessages(m => [...m, { id: `m-${randId()}`, role:'assistant', text: msg.error||'Error', at: now }]);
            break;
          case 'chat.proactive':
            setMessages(m => [...m, { id: `m-${randId()}`, role:'assistant', kind:'proactive', text: msg.message||'', at: now }]);
            break;
          case 'refresh':
            fetch('/api/calendar').then(r => r.json()).then(setCalItems).catch(() => {});
            break;
        }
      };
    }
    connect();
    return () => { clearTimeout(reconnectTimer); ws && ws.close(); };
  }, []);

  const updateTweak = (k, v) => {
    setTweaks((t) => {
      const next = { ...t, [k]: v };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
      return next;
    });
    if (k === "micActive") setMicActive(v);
  };

  // Apply theme CSS vars
  useEffect(() => {
    const root = document.documentElement;
    const themes = {
      navy: {
        "--ink":"#0E1B2C","--ink-2":"#16283F","--ink-3":"#233A55",
        "--paper":"#F5EFE4","--paper-2":"#EFE7D7","--paper-3":"#E6DBC5",
        "--line":"#D8CDB4","--line-ink":"#1E3148",
        "--muted":"#6B6352","--muted-2":"#958B74",
        "--gold":"#B8964E","--gold-soft":"#D9BE84",
        "--oxblood":"#8B3A3A","--sage":"#5B7A5E",
      },
      charcoal: {
        "--ink":"#1C1E22","--ink-2":"#2A2D33","--ink-3":"#3A3E46",
        "--paper":"#F3F1EC","--paper-2":"#ECE9E2","--paper-3":"#E1DDD2",
        "--line":"#D4CFC3","--line-ink":"#32353B",
        "--muted":"#6E6A62","--muted-2":"#948F84",
        "--gold":"#A88441","--gold-soft":"#CEAA6E",
        "--oxblood":"#7E3636","--sage":"#5A7458",
      },
      forest: {
        "--ink":"#15291E","--ink-2":"#1E3A2C","--ink-3":"#2B4D3C",
        "--paper":"#F3EEE1","--paper-2":"#EBE5D3","--paper-3":"#DFD6BE",
        "--line":"#CFC4A9","--line-ink":"#22402F",
        "--muted":"#6B6350","--muted-2":"#978D74",
        "--gold":"#B18A3E","--gold-soft":"#D2B172",
        "--oxblood":"#7A2F2F","--sage":"#4E6B4F",
      },
    };
    const t = themes[tweaks.theme] || themes.navy;
    Object.entries(t).forEach(([k, v]) => root.style.setProperty(k, v));
    root.style.setProperty("--radius", `${tweaks.radius}px`);
    root.style.setProperty("--radius-sm", `${Math.max(2, tweaks.radius - 2)}px`);
    root.style.setProperty("--radius-lg", `${tweaks.radius + 3}px`);

    const pairs = {
      "serif-sans": { serif: `"Source Serif 4", Georgia, serif`, sans: `"Inter", system-ui, sans-serif` },
      "all-sans":   { serif: `"Inter", system-ui, sans-serif`, sans: `"Inter", system-ui, sans-serif` },
      "serif-serif":{ serif: `"Source Serif 4", Georgia, serif`, sans: `"Source Serif 4", Georgia, serif` },
    };
    const p = pairs[tweaks.typePair] || pairs["serif-sans"];
    root.style.setProperty("--font-serif", p.serif);
    root.style.setProperty("--font-sans", p.sans);

    const density = {
      spacious: { pad: "20px", gap: "18px", rowPad: "11px 14px" },
      balanced: { pad: "16px", gap: "14px", rowPad: "9px 12px" },
      dense:    { pad: "12px", gap: "10px", rowPad: "6px 10px" },
    };
    const d = density[tweaks.density] || density.balanced;
    root.style.setProperty("--pad", d.pad);
    root.style.setProperty("--gap", d.gap);
    root.style.setProperty("--row-pad", d.rowPad);
  }, [tweaks]);

  // auto-scroll
  useEffect(() => {
    if (threadRef.current) threadRef.current.scrollTop = threadRef.current.scrollHeight;
  }, [messages.length, thinking]);

  const handleSend = () => {
    const text = input.trim();
    if (!text || !wsRef.current || wsRef.current.readyState !== WebSocket.OPEN) return;
    const now = fmtHHMM(new Date());
    setMessages((m) => [...m, { id: `m-${randId()}`, role: "user", text, at: now }]);
    setInput("");
    setThinking(true);
    setThinkingStatus("Thinking…");
    wsRef.current.send(JSON.stringify({ type: 'chat', message: text }));
  };

  const handlePinMessage = (msg) => {
    if (pinboard.some((p) => p.sourceId === msg.id)) return;
    const newPin = {
      id: `pin-${randId().slice(0, 4)}`,
      sourceId: msg.id,
      title: msg.text.slice(0, 56).replace(/\n/g, " ") + (msg.text.length > 56 ? "…" : ""),
      body: msg.text,
      tag: "From chat",
      when: "Pinned just now",
    };
    setPinboard((p) => [newPin, ...p]);
  };

  const handleRemovePin = (id) => setPinboard((p) => p.filter((x) => x.id !== id));

  return (
    <div className="app">
      <LeftPanel pinboard={pinboard} onRemovePin={handleRemovePin} calItems={calItems} agentName={agentName} userName={userName} />
      <RightPanel
        activeTab={activeTab}
        setActiveTab={setActiveTab}
        messages={messages}
        pinboard={pinboard}
        input={input}
        setInput={setInput}
        onSend={handleSend}
        thinking={thinking}
        thinkingStatus={thinkingStatus}
        micActive={micActive}
        setMicActive={setMicActive}
        onPin={handlePinMessage}
        wsConnected={wsConnected}
        sendMessage={(text) => {
          if (!wsRef.current || wsRef.current.readyState !== WebSocket.OPEN) return;
          const now = fmtHHMM(new Date());
          setMessages((m) => [...m, { id: `m-${randId()}`, role: "user", text, at: now }]);
          setThinking(true);
          setThinkingStatus("Thinking…");
          setActiveTab("chat");
          wsRef.current.send(JSON.stringify({ type: 'chat', message: text }));
        }}
      />
      {tweaksOpen && (
        <TweaksPanel tweaks={tweaks} update={updateTweak} onClose={() => setTweaksOpen(false)} />
      )}
      <GlobalStyle />
    </div>
  );
}

function randId() {
  return Math.random().toString(16).slice(2, 6) + "-" + Math.random().toString(16).slice(2, 6);
}

/* ============================================================
   LEFT PANEL — calendar + timeline + pinboard
   ============================================================ */
function LeftPanel({ pinboard, onRemovePin, calItems, agentName, userName }) {
  const initials = (n) => n ? n.split(" ").map(s => s[0]).slice(0,2).join("").toUpperCase() : "?";
  return (
    <aside className="left">
      <header className="brand">
        <div className="brand-mark" aria-hidden>
          <svg viewBox="0 0 24 24" width="22" height="22">
            <rect x="2" y="2" width="20" height="20" rx="2" fill="none" stroke="currentColor" strokeWidth="1.4"/>
            <path d="M7 16 L12 7 L17 16" fill="none" stroke="currentColor" strokeWidth="1.4"/>
            <path d="M9.5 13 L14.5 13" stroke="currentColor" strokeWidth="1.4"/>
          </svg>
        </div>
        <div>
          <div className="brand-name">{agentName}</div>
          <div className="brand-sub">Personal agent</div>
        </div>
        <div className="brand-status">
          <span className="dot" /> Online
        </div>
      </header>

      <MiniCalendar calItems={calItems} />
      <Timeline calItems={calItems} />
      <Pinboard pins={pinboard} onRemove={onRemovePin} />

      <footer className="left-foot">
        <div className="who">
          <div className="avatar-ex">{initials(userName)}</div>
          <div>
            <div className="who-name">{userName || "You"}</div>
          </div>
        </div>
        <button className="icon-btn" title="Settings" aria-label="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
        </button>
      </footer>
    </aside>
  );
}

function MiniCalendar({ calItems }) {
  const [viewDate, setViewDate] = useState(() => { const d = new Date(); d.setDate(1); return d; });
  const now = new Date();
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayDay = (now.getFullYear() === year && now.getMonth() === month) ? now.getDate() : -1;
  const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  // Build set of days that have events this month
  const eventDays = new Set();
  for (const ci of (calItems || [])) {
    const d = (ci.date || '').slice(0, 10);
    if (d.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) {
      eventDays.add(parseInt(d.slice(8), 10));
    }
  }

  const cells = [];
  const lead = (firstDay + 6) % 7; // Mon-start
  for (let i = 0; i < lead; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const WEEKENDS = new Set();
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(year, month, d).getDay();
    if (dow === 0 || dow === 6) WEEKENDS.add(d);
  }

  return (
    <div className="card calendar">
      <div className="card-head">
        <div>
          <div className="eyebrow">Calendar</div>
          <div className="month">{MONTH_NAMES[month]} <span className="year">{year}</span></div>
        </div>
        <div className="month-nav">
          <button aria-label="Previous" onClick={() => setViewDate(d => new Date(d.getFullYear(), d.getMonth()-1, 1))}>‹</button>
          <button aria-label="Next" onClick={() => setViewDate(d => new Date(d.getFullYear(), d.getMonth()+1, 1))}>›</button>
        </div>
      </div>
      <div className="dow">
        {["M","T","W","T","F","S","S"].map((d, i) => <span key={i}>{d}</span>)}
      </div>
      <div className="days">
        {cells.map((d, i) => {
          if (d === null) return <span key={i} className="day empty" />;
          const cls = ["day", d === todayDay ? "today" : "", WEEKENDS.has(d) ? "weekend" : ""].join(" ");
          const n = eventDays.has(d) ? 1 : 0;
          return (
            <span key={i} className={cls}>
              {d}
              {n > 0 ? <span className="day-dots" data-n="1"><i/></span> : null}
            </span>
          );
        })}
      </div>
    </div>
  );
}

function Timeline({ calItems }) {
  const groups = buildTimelineGroups(calItems || []);
  return (
    <div className="card timeline">
      <div className="card-head flat">
        <div className="eyebrow">Timeline</div>
      </div>
      <div className="tl-body">
        {groups.map((g) => (
          <section key={g.key} className={`tl-group ${g.tone}`}>
            <div className="tl-head">
              <span className="tl-label">{g.label}</span>
              <span className="tl-sub">{g.sub}</span>
            </div>
            <ul className="tl-items">
              {g.items.length === 0
                ? <li className="tl-item kind-empty"><div className="tl-main"><div className="tl-t" style={{opacity:0.4}}>Nothing scheduled</div></div></li>
                : g.items.map((it, i) => (
                  <li key={i} className={`tl-item kind-${it.kind}`}>
                    <span className="tl-kind" aria-hidden>
                      {it.kind === "meeting" && <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="2" width="8" height="7" fill="none" stroke="currentColor" strokeWidth="1"/><path d="M1 4 H9" stroke="currentColor" strokeWidth="1"/></svg>}
                      {it.kind === "todo" && <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1.5" y="1.5" width="7" height="7" rx="1" fill="none" stroke="currentColor" strokeWidth="1"/></svg>}
                      {it.kind === "milestone" && <svg width="10" height="10" viewBox="0 0 10 10"><path d="M5 1 L9 5 L5 9 L1 5 Z" fill="currentColor"/></svg>}
                    </span>

        ))}

}

function ChatTab({ messages, pinboard, input, setInput, onSend, thinking, thinkingStatus, micActive, setMicActive, onPin }) {
  const pinned = new Set((pinboard || []).map((p) => p.sourceId).filter(Boolean));
  const todayLabel = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  return (
    <div className="chat-panel">
      <section className="thread-wrap">
        <div className="thread" id="thread">
          <DayDivider label={`Today · ${todayLabel}`} />
          {messages.map((m) => (
            <Message key={m.id} m={m} onPin={onPin} pinned={pinned} />
          ))}
          {thinking && <Thinking status={thinkingStatus} />}
        </div>

      <Composer
        input={input} setInput={setInput} onSend={onSend}
        micActive={micActive} setMicActive={setMicActive}
      />

function PeopleTab({ sendMessage }) {
  const [people, setPeople] = useState([]);
  const [loading, setLoading] = useState(true);
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(null);
  const [noteOpen, setNoteOpen] = useState(null); // person id with open note box
  const [noteText, setNoteText] = useState("");

  useEffect(() => {
    fetch("/api/entities/person")
      .then((r) => r.json())
      .then((data) => {
        const items = Array.isArray(data) ? data : (data.entities || data.items || []);
        setPeople(items);
        if (items.length > 0) setSel(items[0]);
      })
      .catch(() => {})
      .finally(() => setLoading(false));
  }, []);

  const getName = (p) => p.meta?.title || [p.meta?.firstName, p.meta?.lastName].filter(Boolean).join(" ") || p.id || "Unknown";
  const getType = (p) => p.meta?.type || null;

  const filtered = people.filter((p) => {
    const name = getName(p);
    const type = getType(p) || "";
    return (name + type).toLowerCase().includes(q.toLowerCase());
  });

  const handleAddNote = (p) => {
    const id = p.id || getName(p);
    if (noteOpen === id) { setNoteOpen(null); setNoteText(""); return; }
    setNoteOpen(id);
    setNoteText("");
  };

  const submitNote = (p) => {
    const note = noteText.trim();
    if (!note) return;
    const name = getName(p);
    sendMessage(`add note to person ${name}: ${note}`);
    setNoteOpen(null);
    setNoteText("");
  };

  return (
    <div className="people">
      <header className="sub-head">
        <div>
          <div className="chat-title">
            <span className="serif">People</span>
            <span className="chat-sep">·</span>
            <span className="mono chat-tid">{loading ? "loading…" : `${people.length} people`}</span>
          </div>
          <div className="chat-sub">Agent has context on each person.</div>
        </div>
        <div className="search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="11" cy="11" r="7"/><path d="M20 20 L16 16"/></svg>
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search people…" />
        </div>
      </header>
      <div className="people-body">
        <ul className="people-list">
          {loading && <li className="pin-empty">Loading…</li>}
          {!loading && filtered.map((p) => {
            const name = getName(p);
            const type = getType(p);
            const id = p.id || name;
            const isNoteOpen = noteOpen === id;
            return (
              <li
                key={id}
                className={`person ${sel?.id === p.id ? "on" : ""}`}
                onClick={() => setSel(p)}
              >
                <div className="p-avatar">{initials(name)}</div>
                <div className="p-main">
                  <div className="p-row">
                    <span className="p-name">{name}</span>
                    <button
                      className="btn ghost"
                      style={{ fontSize: "10px", padding: "1px 6px", marginLeft: "auto" }}
                      onClick={(e) => { e.stopPropagation(); handleAddNote(p); }}
                    >
                      {isNoteOpen ? "Cancel" : "Add Note"}
                    </button>
                  </div>
                  {type && <div className="p-row"><span className="p-role">{type}</span></div>}
                  {isNoteOpen && (
                    <div style={{ marginTop: "6px" }} onClick={(e) => e.stopPropagation()}>
                      <textarea
                        autoFocus
                        value={noteText}
                        onChange={(e) => setNoteText(e.target.value)}
                        placeholder={`Note about ${name}…`}
                        rows={3}
                        style={{ width: "100%", fontSize: "11px", resize: "vertical", boxSizing: "border-box" }}
                        onKeyDown={(e) => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) submitNote(p); }}
                      />
                      <button
                        className="btn"
                        style={{ fontSize: "10px", padding: "2px 8px", marginTop: "4px" }}
                        onClick={() => submitNote(p)}
                      >
                        Send
                      </button>
                    </div>
                  )}
                </div>
              </li>
            );
          })}
          {!loading && filtered.length === 0 && people.length > 0 && <li className="pin-empty">No one matches "{q}".</li>}
          {!loading && people.length === 0 && <li className="pin-empty">No people found.</li>}
        </ul>
        <aside className="person-detail">
          {sel && (() => {
            const name = getName(sel);
            const type = getType(sel);
            const extraFields = Object.entries(sel.meta || {}).filter(
              ([k]) => !["title", "type", "firstName", "lastName", "createdAt", "updatedAt"].includes(k)
            );
            return (
              <>
                <div className="p-avatar-lg">{initials(name)}</div>
                <h3>{name}</h3>
                {type && <div className="p-role-lg">{type}</div>}
                {extraFields.length > 0 && (
                  <div className="detail-section">
                    <div className="eyebrow">Details</div>
                    <ul className="detail-list">
                      {extraFields.map(([k, v]) => (
                        <li key={k}><span className="mono dim">{k}:</span> {String(v)}</li>
                      ))}
                    </ul>
                  </div>
                )}
                <div className="detail-section">
                  <div className="eyebrow">Agent actions</div>
                  <div className="detail-btns">
                    <button className="btn" onClick={() => sendMessage(`brief me on ${name}`)}>Brief me</button>
                    <button className="btn ghost" onClick={() => { setNoteOpen(sel.id || name); setNoteText(""); }}>Add Note</button>
                  </div>
                </div>
              </>
            );
          })()}
        </aside>
      </div>
    </div>
  );
}
function initials(n) { return n.split(" ").map(s => s[0]).slice(0,2).join(""); }

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || null;

function Composer({ input, setInput, onSend, micActive, setMicActive }) {
  const taRef = useRef(null);
  const recogRef = useRef(null);

  useEffect(() => {
    const ta = taRef.current;
    if (!ta) return;
    ta.style.height = "auto";
    ta.style.height = Math.min(160, ta.scrollHeight) + "px";
  }, [input]);

  const handleMic = () => {
    if (!SpeechRecognition) return;
    if (micActive) {
      recogRef.current && recogRef.current.stop();
      return;
    }
    const recog = new SpeechRecognition();
    recog.lang = "en-US";
    recog.continuous = false;
    recog.interimResults = true;
    recogRef.current = recog;
    let finalTranscript = "";
    recog.onstart = () => { setMicActive(true); setInput(""); };
    recog.onresult = (e) => {
      finalTranscript = "";
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalTranscript += t;
        else interim += t;
      }
      setInput(finalTranscript || interim);
    };
    recog.onend = () => {
      setMicActive(false);
      if (finalTranscript) setTimeout(onSend, 50);
    };
    recog.onerror = (e) => {
      setMicActive(false);
      if (e.error !== "aborted" && e.error !== "no-speech") console.warn("Speech recognition error:", e.error);
    };
    recog.start();
  };

  return (
    <footer className="composer">
      <button
        className={`mic ${micActive ? "on" : ""} ${!SpeechRecognition ? "hidden" : ""}`}
        onClick={handleMic}
        aria-label={micActive ? "Stop listening" : "Start voice"}
        title={micActive ? "Listening — click to stop" : "Voice input"}
      >
        {micActive ? (
          <Waveform />
        ) : (
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6">
            <rect x="9" y="3" width="6" height="12" rx="3"/>
            <path d="M5 11 a7 7 0 0 0 14 0"/>
            <path d="M12 18 V22"/>
            <path d="M9 22 H15"/>
          </svg>
        )}
      </button>

      <div className="field">
        <textarea
          ref={taRef}
          rows={1}
          placeholder={micActive ? "Listening..." : "Message — or press Enter to send"}
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              onSend();
            }
          }}
        />
        <div className="field-tools">
          <span className="flex-1" />
          <span className="kbd mono">↵</span>
          <button className="send" onClick={onSend} disabled={!input.trim()} aria-label="Send">
            Send
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M2 6 H10 M7 3 L10 6 L7 9"/></svg>
          </button>
        </div>
      </div>
    </footer>
  );
}

function Waveform() {
  return (
    <span className="wave" aria-hidden>
      {[0,1,2,3,4].map((i) => <i key={i} style={{animationDelay: `${i * 0.11}s`}} />)}
    </span>
  );
}

        border-radius: var(--radius);
        padding: 9px 12px;
        cursor: pointer;
        font-family: inherit;
        display: flex; flex-direction: column; gap: 2px;
        color: var(--ink-3);
      }
      .set-nav-item:hover { background: var(--paper); }
      .set-nav-item.on {
        background: var(--paper);
        border-color: var(--line);
        border-left: 3px solid var(--gold);
        padding-left: 10px;
      }
      .set-nav-label { font-size: 13px; font-weight: 500; color: var(--ink); }
      .set-nav-sub { font-size: 10px; color: var(--muted); }

      .settings-body-scroll {
        overflow-y: auto;
        padding: 20px 28px 32px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-content: start;
      }
      .settings-body {
        overflow-y: auto;
        padding: 20px 28px 32px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        align-content: start;
      }
      .settings-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 16px 18px 18px;
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .settings-card > .eyebrow { margin-bottom: -6px; }
      .settings-card.wide { grid-column: 1 / -1; }
      .settings-card h4 {
        font-family: var(--font-serif);
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.005em;
        margin: 0 0 4px;
        line-height: 1.3;
      }
      .settings-hint {
        font-size: 12px; color: var(--muted);
        margin: 0; line-height: 1.5;
      }
      .slider-row {
        display: flex; align-items: center; gap: 12px;
        margin: 0;
      }
      .slider-row input[type=range] { flex: 1; }
      .slider-val {
        font-size: 11px; color: var(--ink-3);
        min-width: 80px; text-align: right;
      }
      .check {
        display: flex; align-items: center; gap: 8px;
        font-size: 12.5px; color: var(--ink-3);
        padding: 5px 0;
        cursor: pointer;
      }
      .check input { accent-color: var(--gold); }

      .integ-list { list-style: none; margin: 0; padding: 0; }
      .integ-list li {
        display: grid;
        grid-template-columns: minmax(160px, 1.1fr) minmax(0, 2fr) auto;
        gap: 14px;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px dashed var(--line);
      }
      .integ-list li:last-child { border-bottom: 0; }
      .integ-name {
        display: flex; align-items: center; gap: 8px;
        font-size: 13px; color: var(--ink);
      }
      .integ-scope {
        font-size: 12px; color: var(--muted);
      }
      .approval-list { list-style: none; margin: 0; padding: 0; }
      .approval-list li {
        display: flex; justify-content: space-between; align-items: center;
        padding: 8px 0;
        border-bottom: 1px dashed var(--line);
        font-size: 13px;
      }
      .approval-list li:last-child { border-bottom: 0; }

      /* Form fields */
      .field-group { display: flex; flex-direction: column; gap: 5px; }
      .field-label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .req { color: var(--oxblood); margin-left: 3px; }
      .field-input {
        border: 1px solid var(--line);
        background: var(--paper-2);
        border-radius: var(--radius-sm);
        padding: 8px 11px;
        font-family: inherit;
        font-size: 13px;
        color: var(--ink);
        outline: none;
        width: 100%;
      }
      .field-input:focus { border-color: var(--gold); background: var(--paper); }
      select.field-input { cursor: pointer; }
      .field-hint { font-size: 11.5px; color: var(--muted); line-height: 1.45; }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .token-row { display: flex; gap: 8px; align-items: center; }
      .token-row .field-input { flex: 1; }
      .save-line { margin-top: 4px; padding-top: 10px; border-top: 1px dashed var(--line); }

      .role-extras {
        margin-top: 4px;
        padding: 12px 14px;
        background: var(--paper-2);
        border: 1px solid var(--line);
        border-left: 3px solid var(--gold);
        border-radius: var(--radius-sm);
        display: flex; flex-direction: column; gap: 10px;
      }
      .role-extras .eyebrow { margin-bottom: 0; }

      .goals-grid {
        display: flex; flex-wrap: wrap; gap: 6px;
        margin-top: 2px;
      }
      .goal-chip {
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--ink-3);
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
      }
      .goal-chip:hover { border-color: var(--gold-soft); }
      .goal-chip.on {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }

      .personality-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 8px;
      }
      .pers-card {
        text-align: left;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 12px 14px;
        cursor: pointer;
        font-family: inherit;
        color: var(--ink);
        display: flex; flex-direction: column; gap: 4px;
      }
      .pers-card:hover { border-color: var(--gold-soft); }
      .pers-card.on {
        border-color: var(--gold);
        background: color-mix(in oklab, var(--gold-soft) 15%, var(--paper));
      }
      .pers-name {
        font-family: var(--font-serif);
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.005em;
      }
      .pers-blurb { font-size: 11.5px; color: var(--muted); line-height: 1.4; }

      .pill-always, .pill-fixed, .pill-host {
        display: inline-block;
        margin-left: 8px;
        font-family: var(--font-mono);
        font-size: 9.5px;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 999px;
        vertical-align: middle;
      }
      .pill-always {
        background: color-mix(in oklab, var(--sage) 14%, var(--paper));
        color: var(--sage);
        border: 1px solid color-mix(in oklab, var(--sage) 30%, var(--line));
      }
      .pill-fixed {
        background: var(--paper-2);
        color: var(--muted);
        border: 1px solid var(--line);
      }
      .pill-host {
        background: color-mix(in oklab, var(--gold-soft) 25%, var(--paper));
        color: var(--gold);
        border: 1px solid color-mix(in oklab, var(--gold) 40%, var(--line));
      }

      .weights-list, .kv-list, .fs-list {
        list-style: none; margin: 0; padding: 0;
      }
      .weights-list li, .fs-list li {
        display: flex; justify-content: space-between; align-items: center;
        padding: 7px 0;
        border-bottom: 1px dashed var(--line);
        font-size: 13px;
      }
      .weights-list li:last-child, .fs-list li:last-child { border-bottom: 0; }
      .kv-list li {
        display: grid;
        grid-template-columns: 1fr 1.6fr auto;
        gap: 10px;
        padding: 7px 0;
        border-bottom: 1px dashed var(--line);
        font-size: 13px;
        align-items: center;
      }
      .kv-list li:last-child { border-bottom: 0; }
      .fs-name { color: var(--ink); font-size: 12.5px; }
      .fs-val { color: var(--muted); font-size: 12.5px; }

      .models-list {
        list-style: none; margin: 0; padding: 0;
        display: flex; flex-direction: column; gap: 10px;
      }
      .models-list li {
        background: var(--paper-2);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
      }
      .m-head {
        display: flex; align-items: center;
        margin-bottom: 4px;
      }
      .m-name { font-size: 13px; font-weight: 500; }
      .m-model { font-size: 12.5px; color: var(--ink-3); margin-bottom: 3px; }
      .m-note { font-size: 11.5px; color: var(--muted); line-height: 1.45; }

      .people-list::-webkit-scrollbar, .person-detail::-webkit-scrollbar, .settings-body::-webkit-scrollbar { width: 8px; }
      .people-list::-webkit-scrollbar-thumb, .person-detail::-webkit-scrollbar-thumb, .settings-body::-webkit-scrollbar-thumb {
        background: color-mix(in oklab, var(--muted-2) 40%, transparent);
        border-radius: 8px;
      }
      .chat-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 28px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--paper);
        gap: 16px;
        flex-wrap: wrap;
      }
      .chat-head > div:first-child { min-width: 0; flex: 1 1 auto; }
      .chat-title {
        display: flex; align-items: baseline; gap: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .chat-title .serif {
        font-family: var(--font-serif);
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .chat-sep { color: var(--line); }
      .chat-tid {
        color: var(--muted);
        font-size: 11px;
      }
      .chat-sub {
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 3px;
        display: flex; align-items: center; gap: 6px;
      }
      .chat-tools { display: flex; align-items: center; gap: 6px; }
      .chip {
        border: 1px solid var(--line);
        background: var(--paper-2);
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 11.5px;
        color: var(--ink-3);
        cursor: pointer;
      }
      .chip:hover { border-color: var(--gold); color: var(--ink); }

      .thread-wrap {
        min-height: 0;
        overflow: hidden;
        display: flex;
        background:
          linear-gradient(var(--paper), var(--paper));
      }
      .thread {
        flex: 1;
        overflow-y: auto;
        padding: 24px 28px 8px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .day-divider {
        display: flex; align-items: center; gap: 10px;
        margin: 4px 0 -4px;
      }
      .day-divider .line { flex: 1; height: 1px; background: var(--line); }
      .day-divider .label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

      .msg-row {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        max-width: 780px;
      }
      .msg-row.ai { align-self: flex-start; }
      .msg-row.me { align-self: flex-end; flex-direction: row; }
      .msg-col { display: flex; flex-direction: column; gap: 5px; max-width: 620px; }
      .msg-row.me .msg-col { align-items: flex-end; }

      .avatar-ai, .avatar-me {
        width: 30px; height: 30px;
        flex: 0 0 30px;
        border-radius: var(--radius-sm);
        display: grid; place-items: center;
        margin-top: 2px;
      }
      .avatar-ai {
        background: var(--ink);
        color: var(--paper);
      }
      .avatar-me {
        background: var(--paper-2);
        border: 1px solid var(--line);
        color: var(--ink);
        font-family: var(--font-serif);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .proactive-tag {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 600;
        display: flex; align-items: center; gap: 6px;
        margin-bottom: 2px;
      }
      .pulse {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 0 0 var(--gold);
        animation: pulse 1.6s infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--gold) 55%, transparent); }
        70% { box-shadow: 0 0 0 8px color-mix(in oklab, var(--gold) 0%, transparent); }
        100% { box-shadow: 0 0 0 0 transparent; }
      }

      .bubble {
        border-radius: var(--radius);
        padding: 12px 14px;
        font-size: 14px;
        line-height: 1.55;
        max-width: 620px;
      }
      .bubble p { margin: 0; }
      .bubble p + p { margin-top: 6px; }
      .bubble .md { line-height: 1.6; }
      .bubble .md p { margin: 0 0 8px; }
      .bubble .md p:last-child { margin-bottom: 0; }
      .bubble .md h1,.bubble .md h2,.bubble .md h3 { margin: 12px 0 6px; font-weight: 600; line-height: 1.3; }
      .bubble .md h1 { font-size: 1.1em; }
      .bubble .md h2 { font-size: 1.0em; }
      .bubble .md h3 { font-size: 0.95em; }
      .bubble .md ul,.bubble .md ol { margin: 6px 0 8px 18px; padding: 0; }
      .bubble .md li { margin-bottom: 3px; }
      .bubble .md li:last-child { margin-bottom: 0; }
      .bubble .md code { font-family: var(--font-mono); font-size: 0.88em; background: var(--paper); border: 1px solid var(--line); border-radius: 3px; padding: 1px 4px; }
      .bubble .md pre { background: var(--paper); border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
      .bubble .md pre code { background: none; border: none; padding: 0; font-size: 0.85em; }
      .bubble .md blockquote { border-left: 3px solid var(--muted); margin: 8px 0; padding: 4px 12px; color: var(--muted); }
      .bubble .md strong { font-weight: 600; }
      .bubble .md em { font-style: italic; }
      .bubble .md a { color: var(--gold); text-decoration: underline; }
      .bubble .md hr { border: none; border-top: 1px solid var(--line); margin: 10px 0; }
      .bubble .md table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 0.9em; }
      .bubble .md th,.bubble .md td { border: 1px solid var(--line); padding: 5px 10px; text-align: left; }
      .bubble .md th { background: var(--paper); font-weight: 600; }
      .bubble.ai {
        background: var(--paper-2);
        color: var(--ink);
        border: 1px solid var(--line);
        border-top-left-radius: 2px;
      }
      .bubble.ai.proactive {
        background: color-mix(in oklab, var(--gold-soft) 20%, var(--paper));
        border-color: color-mix(in oklab, var(--gold) 40%, var(--line));
      }
      .bubble.user {
        background: var(--ink);
        color: var(--paper);
        border: 1px solid var(--ink-2);
        border-top-right-radius: 2px;
      }
      .bubble.thinking {
        display: flex; align-items: center; gap: 6px;
        padding: 10px 14px;
      }
      .dot-a {
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--muted);
        animation: bounce 1.1s infinite;
      }
      .dot-a:nth-child(2) { animation-delay: .15s; }
      .dot-a:nth-child(3) { animation-delay: .3s; }
      @keyframes bounce {
        0%,60%,100% { transform: translateY(0); opacity: .5; }
        30% { transform: translateY(-3px); opacity: 1; }
      }
      .thinking-label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--muted);
        margin-left: 4px;
      }

      .sources {
        display: flex; flex-wrap: wrap; gap: 5px;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed var(--line);
      }
      .source-chip {
        font-size: 10.5px;
        color: var(--muted);
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 2px 6px;
      }
      .actions {
        display: flex; flex-wrap: wrap; gap: 5px;
        margin-top: 8px;
      }
      .action-chip {
        font-size: 11px;
        color: var(--sage);
        background: color-mix(in oklab, var(--sage) 12%, var(--paper));
        border: 1px solid color-mix(in oklab, var(--sage) 30%, var(--line));
        border-radius: var(--radius-sm);
        padding: 3px 7px;
      }

      .meta-ai, .meta-user {
        font-size: 10.5px;
        color: var(--muted-2);
        display: flex;
        align-items: center;
        gap: 6px;
        padding-left: 2px;
      }
      .meta-ai .dim { color: var(--paper-3); }
      .meta-btn {
        background: none; border: 0; padding: 0;
        cursor: pointer;
        color: var(--muted);
        font-family: inherit;
        font-size: inherit;
        display: inline-flex; align-items: center; gap: 3px;
      }
      .meta-btn:hover { color: var(--gold); }

      .pin-action-row {
        display: flex;
        gap: 6px;
        margin-top: 2px;
      }
      .pin-action {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px 4px 8px;
        border: 1px solid var(--line);
        background: var(--paper);
        border-radius: 999px;
        font-family: inherit;
        font-size: 11.5px;
        color: var(--ink-3);
        cursor: pointer;
        transition: border-color .12s ease, background .12s ease, color .12s ease;
      }
      .pin-action:hover:not(:disabled) {
        border-color: var(--gold);
        color: var(--ink);
        background: color-mix(in oklab, var(--gold-soft) 18%, var(--paper));
      }
      .pin-action.pinned {
        border-color: color-mix(in oklab, var(--gold) 45%, var(--line));
        background: color-mix(in oklab, var(--gold-soft) 25%, var(--paper));
        color: var(--ink);
        cursor: default;
      }
      .pin-action.ghost { color: var(--muted); }
      .pin-action:disabled { opacity: 0.9; }
      .pin-emoji {
        font-size: 12px;
        line-height: 1;
        display: inline-block;
        transform: translateY(-0.5px);
      }

      /* Composer */
      .composer {
        display: flex;
        gap: 10px;
        padding: 14px 28px 20px;
        border-top: 1px solid var(--line);
        background: var(--paper);
        align-items: flex-end;
      }
      .mic {
        flex: 0 0 42px;
        width: 42px;
        min-height: 42px;
        border-radius: var(--radius);
        background: var(--paper-2);
        border: 1px solid var(--line);
        color: var(--ink);
        cursor: pointer;
        display: grid; place-items: center;
        transition: background .15s ease, border-color .15s ease;
        align-self: flex-end;
      }
      .mic:hover { background: var(--paper); border-color: var(--gold-soft); }
      .mic.on {
        background: var(--oxblood);
        border-color: var(--oxblood);
        color: var(--paper);
      }
      .wave {
        display: inline-flex; gap: 2px; align-items: center; height: 16px;
      }
      .wave i {
        width: 2px; display: block;
        background: currentColor;
        border-radius: 1px;
        animation: wave 1s infinite ease-in-out;
      }
      @keyframes wave {
        0%, 100% { height: 3px; }
        50% { height: 14px; }
      }
      .wave i:nth-child(1) { height: 5px; }
      .wave i:nth-child(2) { height: 10px; }
      .wave i:nth-child(3) { height: 14px; }
      .wave i:nth-child(4) { height: 8px; }
      .wave i:nth-child(5) { height: 6px; }

      .field {
        flex: 1;
        border: 1px solid var(--line);
        background: var(--paper-2);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        transition: border-color .15s ease, background .15s ease;
      }
      .field:focus-within {
        border-color: var(--gold);
        background: var(--paper);
      }
      .field textarea {
        border: 0; background: transparent;
        font-family: inherit;
        font-size: 14px;
        line-height: 1.5;
        color: var(--ink);
        padding: 11px 14px 6px;
        resize: none;
        outline: none;
        min-height: 24px;
      }
      .field textarea::placeholder { color: var(--muted-2); }
      .field-tools {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 8px 8px;
      }
      .tool-btn {
        width: 24px; height: 24px;
        border: 0; background: transparent;
        cursor: pointer; color: var(--muted);
        border-radius: var(--radius-sm);
        display: grid; place-items: center;
      }
      .tool-btn:hover { color: var(--ink); background: var(--paper-3); }
      .flex-1 { flex: 1; }
      .kbd {
        font-size: 10px;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 3px;
        padding: 1px 5px;
        background: var(--paper);
      }
      .send {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 7px 14px;
        background: var(--ink);
        color: var(--paper);
        border: 1px solid var(--ink);
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 12.5px;
        font-weight: 500;
      }
      .send:disabled { opacity: 0.4; cursor: not-allowed; }
      .send:not(:disabled):hover { background: var(--ink-2); }

      /* Tweaks panel */
      .tweaks-panel {
        position: fixed;
        right: 20px; bottom: 20px;
        width: 280px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
        padding: 14px;
        z-index: 50;
        display: flex; flex-direction: column; gap: 14px;
      }
      .tweaks-panel header {
        display: flex; justify-content: space-between; align-items: center;
      }
      .tweak-grp { display: flex; flex-direction: column; gap: 6px; }
      .tweak-grp label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .seg {
        display: flex; gap: 2px;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 2px;
        background: var(--paper-2);
      }
      .seg.col { flex-direction: column; }
      .seg button {
        flex: 1;
        border: 0; background: transparent;
        padding: 6px 10px;
        font-size: 11.5px;
        color: var(--ink-3);
        cursor: pointer;
        border-radius: var(--radius-sm);
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        text-transform: capitalize;
        font-family: inherit;
      }
      .seg button.on {
        background: var(--ink);
        color: var(--paper);
      }
      .swatch {
        width: 10px; height: 10px;
        border-radius: 50%;
        border: 1px solid rgba(0,0,0,.15);
      }
      .sw-navy { background: #0E1B2C; }
      .sw-charcoal { background: #1C1E22; }
      .sw-forest { background: #15291E; }
      input[type=range] {
        accent-color: var(--gold);
      }

      /* Scrollbars */
      .thread::-webkit-scrollbar, .pin-list::-webkit-scrollbar { width: 8px; }
      .thread::-webkit-scrollbar-thumb, .pin-list::-webkit-scrollbar-thumb {
        background: color-mix(in oklab, var(--muted-2) 40%, transparent);
        border-radius: 8px;
      }
      .thread::-webkit-scrollbar-track, .pin-list::-webkit-scrollbar-track { background: transparent; }

      .mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }

      @media (max-width: 1100px) {
        .app { grid-template-columns: minmax(280px, 30%) 1fr; }
      }
    `}</style>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
