<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Phaibel — Executive AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%230E1B2C'/%3E%3Crect x='4' y='4' width='24' height='24' rx='2' fill='none' stroke='%23F5EFE4' stroke-width='1.6'/%3E%3Cpath d='M10 22 L16 10 L22 22' fill='none' stroke='%23F5EFE4' stroke-width='1.6'/%3E%3Cpath d='M12.5 18 L19.5 18' stroke='%23F5EFE4' stroke-width='1.6'/%3E%3C/svg%3E">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* Deep navy + warm ivory executive palette */
    --ink:        #0E1B2C;   /* deep navy - primary */
    --ink-2:      #16283F;   /* navy-2 */
    --ink-3:      #233A55;   /* navy-3 */
    --paper:      #F5EFE4;   /* warm ivory */
    --paper-2:    #EFE7D7;   /* ivory-2 */
    --paper-3:    #E6DBC5;   /* ivory-3 edge */
    --line:       #D8CDB4;   /* hairline on ivory */
    --line-ink:   #1E3148;   /* hairline on navy */
    --muted:      #6B6352;   /* warm taupe text */
    --muted-2:    #958B74;
    --gold:       #B8964E;   /* muted gold accent */
    --gold-soft:  #D9BE84;
    --oxblood:    #8B3A3A;   /* alert / overdue */
    --sage:       #5B7A5E;   /* done / positive */

    --radius:     5px;
    --radius-sm:  3px;
    --radius-lg:  8px;

    --shadow-sm: 0 1px 0 rgba(14,27,44,.04), 0 1px 2px rgba(14,27,44,.05);
    --shadow-md: 0 1px 0 rgba(14,27,44,.04), 0 6px 20px -10px rgba(14,27,44,.18);

    --font-serif: "Source Serif 4", ui-serif, Georgia, serif;
    --font-sans:  "Inter", ui-sans-serif, system-ui, sans-serif;
    --font-mono:  "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  button { font-family: inherit; color: inherit; }

  /* subtle warm paper grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(14,27,44,.025) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: multiply;
    opacity: .5;
    z-index: 0;
  }
</style>

<body>
<div id="root"></div>

<script type="application/json" id="tweak-defaults">
</script>

<script type="text/babel" data-presets="react">
/* ============================================================
   TWEAKS — default config (persisted via __edit_mode_set_keys)
   ============================================================ */
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "navy",
  "density": "balanced",
  "radius": 5,
  "typePair": "serif-sans",
  "micActive": false
}/*EDITMODE-END*/;

/* ============================================================
   DATA — loaded live from the service
   ============================================================ */
const PIN_STORAGE_KEY = 'assistant_pinboard';

function loadStoredPins() {
  try { return JSON.parse(localStorage.getItem(PIN_STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveStoredPins(pins) {
  try { localStorage.setItem(PIN_STORAGE_KEY, JSON.stringify(pins)); } catch {}
}

function ymd(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); } catch { return ''; }
}
function fmtHHMM(d) {
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}


/* ============================================================
   ONBOARDING MODAL
   ============================================================ */
const { useState, useEffect, useRef, useMemo } = React;

function OnboardingModal({ onComplete }) {
  const [step, setStep] = useState(1);
  const [profiles, setProfiles] = useState([]);
  const [personalities, setPersonalities] = useState([]);
  const [selectedProfile, setSelectedProfile] = useState(null);
  const [answers, setAnswers] = useState({});
  const [agentName, setAgentName] = useState("Agent");
  const [gender, setGender] = useState("other");
  const [personality, setPersonality] = useState("");
  const [progressSteps, setProgressSteps] = useState([
    { label: "Creating your workspace",     status: "pending" },
    { label: "Adding context types",         status: "pending" },
    { label: "Personalizing your assistant", status: "pending" },
    { label: "Finishing up",                 status: "pending" },
  ]);
  const [progressDone, setProgressDone] = useState(false);
  const [progressError, setProgressError] = useState(null);

  useEffect(() => {
    Promise.all([
      fetch("/api/onboarding-profiles").then(r => r.json()).catch(() => []),
      fetch("/api/personalities").then(r => r.json()).catch(() => []),
    ]).then(([p, pers]) => { setProfiles(p); setPersonalities(pers); });
  }, []);

  // When profile selected, pre-select its default personality
  useEffect(() => {
    if (selectedProfile && !personality) {
      setPersonality(selectedProfile.defaultPersonality || "");
    }
  }, [selectedProfile]);

  function updateStep(i, status) {
    setProgressSteps(prev => prev.map((s, idx) => idx === i ? { ...s, status } : s));
  }

  async function submit() {
    setStep(4);
    const steps = ["running", "pending", "pending", "pending"];
    setProgressSteps(prev => prev.map((s, i) => ({ ...s, status: steps[i] })));

    const payload = {
      personality: personality || (selectedProfile && selectedProfile.defaultPersonality) || "executive",
      agentName: agentName || "Agent",
      userName: answers.name || "",
      gender,
      userType: selectedProfile ? selectedProfile.type : undefined,
      profileAnswers: answers,
    };

    try {
      await new Promise(r => setTimeout(r, 300));
      setProgressSteps(p => p.map((s, i) => ({ ...s, status: i === 0 ? "done" : i === 1 ? "running" : "pending" })));

      const res = await fetch("/api/setup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error || "Setup failed");
      }

      setProgressSteps(p => p.map((s, i) => ({ ...s, status: i <= 1 ? "done" : i === 2 ? "running" : "pending" })));
      await new Promise(r => setTimeout(r, 300));
      setProgressSteps(p => p.map((s, i) => ({ ...s, status: i <= 2 ? "done" : "running" })));
      await new Promise(r => setTimeout(r, 400));
      setProgressSteps(p => p.map(s => ({ ...s, status: "done" })));
      setProgressDone(true);
      await new Promise(r => setTimeout(r, 700));
      onComplete(payload.agentName);
    } catch (err) {
      setProgressError(err.message || String(err));
    }
  }

  const ic = {
    done:    <span style={{color:"#22c55e",fontSize:"16px"}}>✓</span>,
    running: <span style={{display:"inline-block",animation:"ob-spin 0.9s linear infinite",color:"var(--gold)",fontSize:"16px"}}>↻</span>,
    error:   <span style={{color:"#f59e0b",fontSize:"16px"}}>!</span>,
    pending: <span style={{color:"#374151",fontSize:"16px"}}>○</span>,
  };

  const cardStyle = {
    position:"fixed", inset:0, background:"rgba(8,13,20,0.96)",
    zIndex:2000, overflowY:"auto", display:"flex", flexDirection:"column",
    alignItems:"center", justifyContent:"flex-start", padding:"40px 20px 60px",
  };
  const innerStyle = { width:"100%", maxWidth:"520px" };
  const stepLabel = { fontSize:"11px", fontWeight:"700", letterSpacing:"1px", textTransform:"uppercase", color:"var(--gold)", marginBottom:"8px" };
  const title = { fontSize:"26px", fontWeight:"700", color:"var(--paper)", marginBottom:"4px", lineHeight:"1.2" };
  const subtitle = { fontSize:"14px", color:"var(--muted)", marginBottom:"28px", lineHeight:"1.5" };
  const continueBtn = (disabled) => ({
    width:"100%", background: disabled ? "var(--ink-3)" : "var(--gold)", color: disabled ? "var(--muted)" : "var(--ink)",
    border:"none", fontFamily:"inherit", fontSize:"15px", fontWeight:"700", padding:"14px",
    borderRadius:"10px", cursor: disabled ? "not-allowed" : "pointer", marginTop:"8px",
    display:"flex", alignItems:"center", justifyContent:"center", gap:"8px",
  });
  const skipBtn = { width:"100%", background:"none", border:"none", color:"var(--muted)", fontFamily:"inherit", fontSize:"13px", padding:"10px", cursor:"pointer", marginTop:"4px" };
  const backBtn = { background:"none", border:"none", color:"var(--gold)", fontFamily:"inherit", fontSize:"13px", fontWeight:"600", padding:"0 0 16px 0", cursor:"pointer", display:"flex", alignItems:"center", gap:"4px" };
  const fieldLabel = { display:"block", fontSize:"11px", color:"var(--muted)", textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:"5px" };
  const input = { width:"100%", background:"var(--ink-2)", border:"1px solid var(--ink-3)", color:"var(--paper)", fontFamily:"inherit", fontSize:"14px", padding:"10px 12px", borderRadius:"8px", outline:"none", boxSizing:"border-box" };

  if (step === 1) return (
    <div style={cardStyle}>
      <div style={innerStyle}>
        <div style={stepLabel}>Step 1 of 3</div>
        <div style={title}>Who are you?</div>
        <div style={subtitle}>Phaibel will tailor itself to how you work.</div>
        <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"28px"}}>
          {profiles.map(p => (
            <div key={p.type}
              onClick={() => setSelectedProfile(p)}
              style={{
                display:"flex", alignItems:"center", gap:"14px",
                background: selectedProfile?.type === p.type ? p.accentColor + "12" : "var(--ink-2)",
                border: `1.5px solid ${selectedProfile?.type === p.type ? p.accentColor : "var(--ink-3)"}`,
                borderRadius:"12px", padding:"14px 16px", cursor:"pointer",
              }}>
              <div style={{width:"44px",height:"44px",borderRadius:"10px",background:p.accentColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:0}}>{p.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:"15px",fontWeight:"600",color: selectedProfile?.type === p.type ? p.accentColor : "var(--paper)",marginBottom:"2px"}}>{p.label}</div>
                <div style={{fontSize:"12px",color:"var(--muted)",lineHeight:"1.4"}}>{p.tagline}</div>
              </div>
              {selectedProfile?.type === p.type && <span style={{color:p.accentColor,fontSize:"18px"}}>✓</span>}
            </div>
          ))}
        </div>
        <button style={continueBtn(!selectedProfile)} disabled={!selectedProfile} onClick={() => setStep(2)}>Continue →</button>
      </div>
    </div>
  );

  if (step === 2) return (
    <div style={cardStyle}>
      <div style={innerStyle}>
        <button style={backBtn} onClick={() => setStep(1)}>← Back</button>
        <div style={stepLabel}>Step 2 of 3</div>
        <div style={title}>Tell us about yourself</div>
        <div style={subtitle}>This helps your assistant understand your context from day one.</div>
        {selectedProfile && (
          <div style={{display:"inline-flex",alignItems:"center",gap:"6px",fontSize:"12px",fontWeight:"600",padding:"4px 10px",borderRadius:"20px",border:`1px solid ${selectedProfile.accentColor}40`,background:selectedProfile.accentColor+"15",color:selectedProfile.accentColor,marginBottom:"20px"}}>
            {selectedProfile.icon} {selectedProfile.label}
          </div>
        )}
        {selectedProfile?.questions.map(q => (
          <div key={q.key} style={{marginBottom:"20px"}}>
            <div style={{fontSize:"15px",color:"var(--paper)",fontWeight:"500",marginBottom:"4px"}}>{q.question}</div>
            {q.optional && <div style={{fontSize:"11px",color:"var(--muted)",marginBottom:"4px"}}>Optional</div>}
            {q.multiline
              ? <textarea rows={3} value={answers[q.key]||""} onChange={e=>setAnswers(p=>({...p,[q.key]:e.target.value}))} placeholder={q.placeholder} style={{...input,resize:"vertical",textAlignVertical:"top"}} />
              : <input type="text" value={answers[q.key]||""} onChange={e=>setAnswers(p=>({...p,[q.key]:e.target.value}))} placeholder={q.placeholder} style={input} />
            }
          </div>
        ))}
        <button style={continueBtn(false)} onClick={() => setStep(3)}>Continue →</button>
        <button style={skipBtn} onClick={() => setStep(3)}>Skip for now</button>
      </div>
    </div>
  );

  if (step === 3) return (
    <div style={cardStyle}>
      <div style={innerStyle}>
        <button style={backBtn} onClick={() => setStep(2)}>← Back</button>
        <div style={stepLabel}>Step 3 of 3</div>
        <div style={title}>Meet your assistant</div>
        <div style={subtitle}>Give your agent a name and pick a personality.</div>
        <div style={{marginBottom:"16px"}}>
          <label style={fieldLabel}>Agent Name</label>
          <input type="text" value={agentName} onChange={e=>setAgentName(e.target.value)} placeholder="e.g. Jarvis, Friday, Alfred" style={input} />
        </div>
        <div style={{marginBottom:"20px"}}>
          <label style={fieldLabel}>How should your agent address you?</label>
          <select value={gender} onChange={e=>setGender(e.target.value)} style={input}>
            <option value="male">Sir / Boss / Captain</option>
            <option value="female">Ma'am / Miss / Madam</option>
            <option value="other">Boss / Chief / Friend</option>
          </select>
        </div>
        <div style={{marginBottom:"24px"}}>
          <label style={fieldLabel}>Personality</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
            {personalities.map(p => (
              <div key={p.id}
                onClick={()=>setPersonality(p.id)}
                style={{
                  background: personality===p.id ? "var(--ink-3)" : "var(--ink-2)",
                  border:`1.5px solid ${personality===p.id ? "var(--gold)" : "var(--ink-3)"}`,
                  borderRadius:"8px", padding:"12px 14px", cursor:"pointer",
                }}>
                <div style={{fontSize:"13px",fontWeight:"600",color:personality===p.id?"var(--gold)":"var(--paper)",marginBottom:"3px"}}>{p.label}</div>
                <div style={{fontSize:"11px",color:"var(--muted)",lineHeight:"1.4"}}>{p.description}</div>
              </div>
            ))}
          </div>
        </div>
        <button style={continueBtn(false)} onClick={submit}>Set Up Phaibel →</button>
      </div>
    </div>
  );

  return (
    <div style={cardStyle}>
      <div style={{...innerStyle,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
        {selectedProfile && (
          <div style={{width:"72px",height:"72px",borderRadius:"18px",background:selectedProfile.accentColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"32px",marginBottom:"20px"}}>{selectedProfile.icon}</div>
        )}
        <div style={{...title,textAlign:"center"}}>{progressDone ? "You're all set!" : progressError ? "Setup failed" : "Setting up Phaibel…"}</div>
        <div style={{...subtitle,textAlign:"center"}}>
          {progressDone ? `Configured for ${selectedProfile?.label || "Phaibel"}. Let's get started.`
           : progressError ? progressError
           : "Just a moment while we configure everything."}
        </div>
        <div style={{width:"100%",marginTop:"32px",display:"flex",flexDirection:"column",gap:"16px"}}>
          {progressSteps.map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:"14px"}}>
              <div style={{width:"24px",textAlign:"center"}}>{ic[s.status]}</div>
              <div style={{fontSize:"15px",color:s.status==="done"||s.status==="running"?"var(--paper)":"var(--muted)",fontWeight:s.status==="running"?"600":"400"}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT
   ============================================================ */

function App() {
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [messages, setMessages] = useState(() => {
    try { return JSON.parse(localStorage.getItem("phaibel_messages") || "[]"); } catch { return []; }
  });
  useEffect(() => {
    try { localStorage.setItem("phaibel_messages", JSON.stringify(messages.slice(-20))); } catch {}
  }, [messages]);
  const [pinboard, setPinboard] = useState(loadStoredPins);
  const [input, setInput] = useState("");
  const [micActive, setMicActive] = useState(tweaks.micActive);
  const [thinking, setThinking] = useState(false);
  const [thinkingStatus, setThinkingStatus] = useState("Thinking…");
  const [activeTab, setActiveTab] = useState("chat");
  const [drawerOpen, setDrawerOpen] = useState(() => {
    try { return localStorage.getItem('ph-drawer-open') === 'true'; } catch { return false; }
  });
  const [wsConnected, setWsConnected] = useState(false);
  const [agentName, setAgentName] = useState("Phaibel");
  const [userName, setUserName] = useState("");
  const [showOnboarding, setShowOnboarding] = useState(false);
  const threadRef = useRef(null);
  const wsRef = useRef(null);

  // Edit-mode wiring
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  // Persist drawer state
  useEffect(() => {
    try { localStorage.setItem('ph-drawer-open', drawerOpen ? 'true' : 'false'); } catch {}
  }, [drawerOpen]);

  // Fetch agent status
  useEffect(() => {
    fetch('/api/status').then(r => r.json()).then(d => {
      if (d.agentName) setAgentName(d.agentName);
      if (d.userName) setUserName(d.userName);
      if (!d.interviewComplete) setShowOnboarding(true);
    }).catch(() => {});
  }, []);

  // Persist pins
  useEffect(() => { saveStoredPins(pinboard); }, [pinboard]);

  // WebSocket
  useEffect(() => {
    let ws, reconnectTimer;
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host);
      wsRef.current = ws;
      ws.onopen = () => setWsConnected(true);
      ws.onclose = () => { setWsConnected(false); reconnectTimer = setTimeout(connect, 3000); };
      ws.onmessage = (ev) => {
        let msg; try { msg = JSON.parse(ev.data); } catch { return; }
        const now = fmtHHMM(new Date());
        switch (msg.type) {
          case 'chat.thinking':
            setThinkingStatus(msg.status || 'Thinking…');
            setThinking(true);
            break;
          case 'chat.response':
            setThinking(false);
            setMessages(m => [...m, { id: `m-${randId()}`, role:'assistant', text: msg.message||'', at: now, tokens: msg.totalTokens||0, inputTokens: msg.inputTokens||0, outputTokens: msg.outputTokens||0 }]);
            break;
          case 'chat.error':
            setThinking(false);
            setMessages(m => [...m, { id: `m-${randId()}`, role:'assistant', text: msg.error||'Error', at: now }]);
            break;
          case 'chat.proactive':
            setMessages(m => [...m, { id: `m-${randId()}`, role:'assistant', kind:'proactive', text: msg.message||'', at: now }]);
            break;
          case 'refresh':
            break;
        }
      };
    }
    connect();
    return () => { clearTimeout(reconnectTimer); ws && ws.close(); };
  }, []);

  const updateTweak = (k, v) => {
    setTweaks((t) => {
      const next = { ...t, [k]: v };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
      return next;
    });
    if (k === "micActive") setMicActive(v);
  };

  // Apply theme CSS vars
  useEffect(() => {
    const root = document.documentElement;
    const themes = {
      navy: {
        "--ink":"#0E1B2C","--ink-2":"#16283F","--ink-3":"#233A55",
        "--paper":"#F5EFE4","--paper-2":"#EFE7D7","--paper-3":"#E6DBC5",
        "--line":"#D8CDB4","--line-ink":"#1E3148",
        "--muted":"#6B6352","--muted-2":"#958B74",
        "--gold":"#B8964E","--gold-soft":"#D9BE84",
        "--oxblood":"#8B3A3A","--sage":"#5B7A5E",
      },
      charcoal: {
        "--ink":"#1C1E22","--ink-2":"#2A2D33","--ink-3":"#3A3E46",
        "--paper":"#F3F1EC","--paper-2":"#ECE9E2","--paper-3":"#E1DDD2",
        "--line":"#D4CFC3","--line-ink":"#32353B",
        "--muted":"#6E6A62","--muted-2":"#948F84",
        "--gold":"#A88441","--gold-soft":"#CEAA6E",
        "--oxblood":"#7E3636","--sage":"#5A7458",
      },
      forest: {
        "--ink":"#15291E","--ink-2":"#1E3A2C","--ink-3":"#2B4D3C",
        "--paper":"#F3EEE1","--paper-2":"#EBE5D3","--paper-3":"#DFD6BE",
        "--line":"#CFC4A9","--line-ink":"#22402F",
        "--muted":"#6B6350","--muted-2":"#978D74",
        "--gold":"#B18A3E","--gold-soft":"#D2B172",
        "--oxblood":"#7A2F2F","--sage":"#4E6B4F",
      },
    };
    const t = themes[tweaks.theme] || themes.navy;
    Object.entries(t).forEach(([k, v]) => root.style.setProperty(k, v));
    root.style.setProperty("--radius", `${tweaks.radius}px`);
    root.style.setProperty("--radius-sm", `${Math.max(2, tweaks.radius - 2)}px`);
    root.style.setProperty("--radius-lg", `${tweaks.radius + 3}px`);

    const pairs = {
      "serif-sans": { serif: `"Source Serif 4", Georgia, serif`, sans: `"Inter", system-ui, sans-serif` },
      "all-sans":   { serif: `"Inter", system-ui, sans-serif`, sans: `"Inter", system-ui, sans-serif` },
      "serif-serif":{ serif: `"Source Serif 4", Georgia, serif`, sans: `"Source Serif 4", Georgia, serif` },
    };
    const p = pairs[tweaks.typePair] || pairs["serif-sans"];
    root.style.setProperty("--font-serif", p.serif);
    root.style.setProperty("--font-sans", p.sans);

    const density = {
      spacious: { pad: "20px", gap: "18px", rowPad: "11px 14px" },
      balanced: { pad: "16px", gap: "14px", rowPad: "9px 12px" },
      dense:    { pad: "12px", gap: "10px", rowPad: "6px 10px" },
    };
    const d = density[tweaks.density] || density.balanced;
    root.style.setProperty("--pad", d.pad);
    root.style.setProperty("--gap", d.gap);
    root.style.setProperty("--row-pad", d.rowPad);
  }, [tweaks]);

  // auto-scroll — follow the chat only when the user is within 10% of the bottom
  useEffect(() => {
    const el = threadRef.current;
    if (!el) return;
    const distFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
    const threshold = el.scrollHeight * 0.10;
    if (distFromBottom <= threshold) {
      el.scrollTop = el.scrollHeight;
    }
  }, [messages.length, thinking]);

  const handleSend = () => {
    const text = input.trim();
    if (!text || !wsRef.current || wsRef.current.readyState !== WebSocket.OPEN) return;
    const now = fmtHHMM(new Date());
    setMessages((m) => [...m, { id: `m-${randId()}`, role: "user", text, at: now }]);
    setInput("");
    setThinking(true);
    setThinkingStatus("Thinking…");
    wsRef.current.send(JSON.stringify({ type: 'chat', message: text }));
  };

  const handlePinMessage = (msg) => {
    if (pinboard.some((p) => p.sourceId === msg.id)) return;
    const newPin = {
      id: `pin-${randId().slice(0, 4)}`,
      sourceId: msg.id,
      title: msg.text.slice(0, 56).replace(/\n/g, " ") + (msg.text.length > 56 ? "…" : ""),
      body: msg.text,
      tag: "From chat",
      when: "Pinned just now",
    };
    setPinboard((p) => [newPin, ...p]);
  };

  const handleRemovePin = (id) => setPinboard((p) => p.filter((x) => x.id !== id));
  const handleClearPins = () => setPinboard([]);

  const handleSendMessage = (text) => {
    if (!wsRef.current || wsRef.current.readyState !== WebSocket.OPEN) return;
    const now = fmtHHMM(new Date());
    setMessages((m) => [...m, { id: `m-${randId()}`, role: "user", text, at: now }]);
    setThinking(true);
    setThinkingStatus("Thinking…");
    setActiveTab("chat");
    wsRef.current.send(JSON.stringify({ type: 'chat', message: text }));
  };

  return (
    <div className="app">
      <LeftPanel pinboard={pinboard} onRemovePin={handleRemovePin} onClearAll={handleClearPins} agentName={agentName} drawerOpen={drawerOpen} setDrawerOpen={setDrawerOpen} />
      <RightPanel
        activeTab={activeTab}
        setActiveTab={setActiveTab}
        messages={messages}
        pinboard={pinboard}
        input={input}
        setInput={setInput}
        onSend={handleSend}
        thinking={thinking}
        thinkingStatus={thinkingStatus}
        micActive={micActive}
        setMicActive={setMicActive}
        onPin={handlePinMessage}
        wsConnected={wsConnected}
        sendMessage={handleSendMessage}
        agentName={agentName}
        drawerOpen={drawerOpen}
        setDrawerOpen={setDrawerOpen}
      />
      {tweaksOpen && (
        <TweaksPanel tweaks={tweaks} update={updateTweak} onClose={() => setTweaksOpen(false)} />
      )}
      {showOnboarding && (
        <OnboardingModal onComplete={(name) => {
          if (name) setAgentName(name);
          setShowOnboarding(false);
          window.location.reload();
        }} />
      )}
      <GlobalStyle />
    </div>
  );
}

function randId() {
  return Math.random().toString(16).slice(2, 6) + "-" + Math.random().toString(16).slice(2, 6);
}

function ChatTab({ messages, pinboard, input, setInput, onSend, thinking, thinkingStatus, micActive, setMicActive, onPin }) {
  const pinned = new Set((pinboard || []).map((p) => p.sourceId).filter(Boolean));
  const todayLabel = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  return (
    <div className="chat-panel">
      <section className="thread-wrap">

const RELATIONSHIP_OPTIONS = [
  "colleague", "friend", "family", "manager", "direct report",
  "client", "vendor", "mentor", "partner", "acquaintance", "other",
];

function PeopleTab({ sendMessage }) {
  const [people, setPeople] = useState([]);
  const [companies, setCompanies] = useState([]);
  const [calItems, setCalItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(null);
  const [noteOpen, setNoteOpen] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [addOpen, setAddOpen] = useState(false);
  const [addName, setAddName] = useState("");
  const [addRel, setAddRel] = useState("colleague");

  useEffect(() => {
    Promise.all([
      fetch("/api/entities/person").then(r => r.json()).catch(() => []),
      fetch("/api/entities/company").then(r => r.json()).catch(() => []),
      fetch("/api/calendar").then(r => r.json()).catch(() => []),
    ]).then(([pData, cData, calData]) => {
      const items = Array.isArray(pData) ? pData : (pData.entities || pData.items || []);
      const cItems = Array.isArray(cData) ? cData : (cData.entities || cData.items || []);
      setPeople(items);
      setCompanies(cItems);
      setCalItems(Array.isArray(calData) ? calData : []);
      if (items.length > 0) setSel(items[0]);
    }).finally(() => setLoading(false));
  }, []);

  const companyMap = React.useMemo(() => {
    const m = new Map();
    for (const c of companies) m.set(c.id, c.meta?.title || c.id);
    return m;
  }, [companies]);

  // Upcoming annual dates per entity id
  const upcomingByEntity = React.useMemo(() => {
    const m = new Map();
    for (const ci of calItems) {
      if (!ci.recurrence || !ci.id) continue;
      if (!m.has(ci.id)) m.set(ci.id, []);
      m.get(ci.id).push(ci);
    }
    return m;
  }, [calItems]);

  const getName = (p) => p.meta?.title || [p.meta?.firstName, p.meta?.lastName].filter(Boolean).join(" ") || p.id || "Unknown";
  const getType = (p) => p.meta?.type || null;

  const filtered = people.filter((p) => {
    const name = getName(p);
    const type = getType(p) || "";
    return (name + type).toLowerCase().includes(q.toLowerCase());
  });

  const handleAddNote = (p) => {
    const id = p.id || getName(p);
    if (noteOpen === id) { setNoteOpen(null); setNoteText(""); return; }
    setNoteOpen(id);
    setNoteText("");
  };

  const submitNote = (p) => {
    const note = noteText.trim();
    if (!note) return;
    const name = getName(p);
    sendMessage(`add note to person ${name}: ${note}`);
    setNoteOpen(null);
    setNoteText("");
  };

  const submitAddPerson = () => {
    const name = addName.trim();
    if (!name) return;
    sendMessage(`Add a new person called ${name}. Their relationship to me is ${addRel}.`);
    setAddOpen(false);
    setAddName("");
    setAddRel("colleague");
  };

  return (
    <div className="people">
      <header className="sub-head">
        <div>
          <div className="chat-title">
            <span className="serif">People</span>
            <span className="chat-sep">·</span>
            <span className="mono chat-tid">{loading ? "loading…" : `${people.length} people`}</span>
          </div>
          <div className="chat-sub">Agent has context on each person.</div>
        </div>
        <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
          <div className="search">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="11" cy="11" r="7"/><path d="M20 20 L16 16"/></svg>
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search people…" />
          </div>
          <button className="btn" style={{ whiteSpace: "nowrap", fontSize: "11.5px" }} onClick={() => { setAddOpen(o => !o); setAddName(""); setAddRel("colleague"); }}>
            {addOpen ? "Cancel" : "+ Add Person"}
          </button>
        </div>
      </header>
      {addOpen && (
        <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--line)", display: "flex", flexDirection: "column", gap: "8px" }}>
          <input
            autoFocus
            className="field-input"
            value={addName}
            onChange={(e) => setAddName(e.target.value)}
            placeholder="Full name"
            onKeyDown={(e) => { if (e.key === "Enter") submitAddPerson(); if (e.key === "Escape") setAddOpen(false); }}
          />
          <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
            <label style={{ fontSize: "11.5px", color: "var(--muted)", whiteSpace: "nowrap" }}>Relationship</label>
            <select className="field-input" value={addRel} onChange={(e) => setAddRel(e.target.value)} style={{ flex: 1 }}>
              {RELATIONSHIP_OPTIONS.map(r => <option key={r} value={r}>{r}</option>)}
            </select>
            <button className="btn" onClick={submitAddPerson} disabled={!addName.trim()}>Add</button>
          </div>
        </div>
      )}
      <div className="people-body">
        <ul className="people-list">
          {loading && <li className="pin-empty">Loading…</li>}
          {!loading && filtered.map((p) => {
            const name = getName(p);
            const type = getType(p);
            const id = p.id || name;
            const isNoteOpen = noteOpen === id;
            const companyName = p.meta?.company ? companyMap.get(p.meta.company) : null;
            const upcoming = upcomingByEntity.get(p.id) || [];
            const soonest = upcoming.filter(u => u.daysAway <= 30).sort((a,b) => a.daysAway - b.daysAway)[0];
            return (
              <li
                key={id}
                className={`person ${sel?.id === p.id ? "on" : ""}`}
                onClick={() => setSel(p)}
              >
                <div className="p-avatar">{initials(name)}</div>
                <div className="p-main">
                  <div className="p-row">
                    <span className="p-name">{name}</span>
                    {soonest && <span className="p-badge" title={soonest.title}>↻ {soonest.daysAway === 0 ? "today" : soonest.daysAway === 1 ? "tmrw" : `${soonest.daysAway}d`}</span>}
                    <button
                      className="btn ghost"
                      style={{ fontSize: "10px", padding: "1px 6px", marginLeft: "auto" }}
                      onClick={(e) => { e.stopPropagation(); handleAddNote(p); }}
                    >
                      {isNoteOpen ? "Cancel" : "Add Note"}
                    </button>
                  </div>
                  {type && <div className="p-row"><span className="p-role">{type}</span></div>}
                  {companyName && <div className="p-row"><span className="p-company">{companyName}</span></div>}
                  {isNoteOpen && (
                    <div style={{ marginTop: "6px" }} onClick={(e) => e.stopPropagation()}>
                      <textarea
                        autoFocus
                        value={noteText}
                        onChange={(e) => setNoteText(e.target.value)}
                        placeholder={`Note about ${name}…`}
                        rows={3}
                        style={{ width: "100%", fontSize: "11px", resize: "vertical", boxSizing: "border-box" }}
                        onKeyDown={(e) => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) submitNote(p); }}
                      />
                      <button
                        className="btn"
                        style={{ fontSize: "10px", padding: "2px 8px", marginTop: "4px" }}
                        onClick={() => submitNote(p)}
                      >
                        Send
                      </button>
                    </div>
                  )}
                </div>
              </li>
            );
          })}
          {!loading && filtered.length === 0 && people.length > 0 && <li className="pin-empty">No one matches "{q}".</li>}
          {!loading && people.length === 0 && <li className="pin-empty">No people found.</li>}
        </ul>
        <aside className="person-detail">
          {sel && (() => {
            const name = getName(sel);
            const type = getType(sel);
            const companyName = sel.meta?.company ? companyMap.get(sel.meta.company) : null;
            const personUpcoming = (upcomingByEntity.get(sel.id) || []).sort((a,b) => a.daysAway - b.daysAway);
            const extraFields = Object.entries(sel.meta || {}).filter(
              ([k]) => !["title", "type", "firstName", "lastName", "company", "createdAt", "updatedAt", "created", "updated", "id", "entityType", "tags", "summary"].includes(k)
            );
            return (
              <>
                <div className="p-avatar-lg">{initials(name)}</div>
                <h3>{name}</h3>
                {type && <div className="p-role-lg">{type}</div>}
                {companyName && (
                  <div className="detail-section">
                    <div className="eyebrow">Company</div>
                    <div className="p-company-link">{companyName}</div>
                  </div>
                )}
                {personUpcoming.length > 0 && (
                  <div className="detail-section">
                    <div className="eyebrow">Upcoming Dates</div>
                    <ul className="detail-list">
                      {personUpcoming.map((u, i) => (
                        <li key={i}><span className="mono dim">↻</span> {u.title.split(' — ')[1] || u.title} · <span className="dim">{u.date}{u.daysAway === 0 ? " (today)" : u.daysAway === 1 ? " (tomorrow)" : ` (${u.daysAway}d)`}</span></li>
                      ))}
                    </ul>
                  </div>
                )}
                {extraFields.length > 0 && (
                  <div className="detail-section">
                    <div className="eyebrow">Details</div>
                    <ul className="detail-list">
                      {extraFields.map(([k, v]) => (
                        <li key={k}><span className="mono dim">{k}:</span> {String(v)}</li>
                      ))}
                    </ul>
                  </div>
                )}
                <div className="detail-section">
                  <div className="eyebrow">Agent actions</div>
                  <div className="detail-btns">
                    <button className="btn" onClick={() => sendMessage(`brief me on ${name}`)}>Brief me</button>
                    <button className="btn ghost" onClick={() => { setNoteOpen(sel.id || name); setNoteText(""); }}>Add Note</button>
                  </div>
                </div>
              </>
            );
          })()}
        </aside>
      </div>
    </div>
  );
}
function initials(n) { return n.split(" ").map(s => s[0]).slice(0,2).join(""); }

function CompaniesTab({ sendMessage }) {
  const [companies, setCompanies] = useState([]);
  const [people, setPeople] = useState([]);
  const [loading, setLoading] = useState(true);
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(null);

  useEffect(() => {
    Promise.all([
      fetch("/api/entities/company").then(r => r.json()).catch(() => []),
      fetch("/api/entities/person").then(r => r.json()).catch(() => []),
    ]).then(([cData, pData]) => {
      const cItems = Array.isArray(cData) ? cData : (cData.entities || cData.items || []);
      const pItems = Array.isArray(pData) ? pData : (pData.entities || pData.items || []);
      setCompanies(cItems);
      setPeople(pItems);
      if (cItems.length > 0) setSel(cItems[0]);
    }).finally(() => setLoading(false));
  }, []);

  // People grouped by their company reference
  const peopleByCompany = React.useMemo(() => {
    const m = new Map();
    for (const p of people) {
      const cid = p.meta?.company;
      if (!cid) continue;
      if (!m.has(cid)) m.set(cid, []);
      m.get(cid).push(p);
    }
    return m;
  }, [people]);

  const getName = (e) => e.meta?.title || e.id || "Unknown";
  const filtered = companies.filter(c => getName(c).toLowerCase().includes(q.toLowerCase()));

  return (
    <div className="people">
      <header className="sub-head">
        <div>
          <div className="chat-title">
            <span className="serif">Companies</span>
            <span className="chat-sep">·</span>
            <span className="mono chat-tid">{loading ? "loading…" : `${companies.length} companies`}</span>
          </div>
          <div className="chat-sub">Organizations and their people.</div>
        </div>
        <div className="search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="11" cy="11" r="7"/><path d="M20 20 L16 16"/></svg>
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search companies…" />
        </div>
      </header>
      <div className="people-body">
        <ul className="people-list">
          {loading && <li className="pin-empty">Loading…</li>}
          {!loading && filtered.map((c) => {
            const name = getName(c);
            const id = c.id || name;
            const personCount = (peopleByCompany.get(c.id) || []).length;
            return (
              <li key={id} className={`person ${sel?.id === c.id ? "on" : ""}`} onClick={() => setSel(c)}>
                <div className="p-avatar">{name.slice(0,2).toUpperCase()}</div>
                <div className="p-main">
                  <div className="p-row">
                    <span className="p-name">{name}</span>

function RetentionSetting() {
  const [retentionDays, setRetentionDays] = React.useState(7);
  const [input, setInput] = React.useState('');
  const [status, setStatus] = React.useState(null); // 'saving' | 'saved' | 'error'

  React.useEffect(() => {
    fetch('/api/settings/log-retention')
      .then(r => r.json())
      .then(d => { setRetentionDays(d.retentionDays); setInput(String(d.retentionDays)); })
      .catch(() => {});
  }, []);

  function save() {
    const days = parseInt(input, 10);
    if (!days || days < 1) return;
    setStatus('saving');
    fetch('/api/settings/log-retention', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ retentionDays: days }),
    })
      .then(r => r.json())
      .then(d => {
        setRetentionDays(d.retentionDays);
        setStatus(d.pruned > 0 ? `Saved · ${d.pruned} old log${d.pruned !== 1 ? 's' : ''} deleted` : 'Saved');
        setTimeout(() => setStatus(null), 3000);
      })
      .catch(() => { setStatus('Error saving'); setTimeout(() => setStatus(null), 3000); });
  }

  return (
    <div className="retention-row">
      <span className="retention-label">Delete logs older than</span>
      <input
        className="retention-input mono"
        type="number"
        min="1"
        value={input}
        onChange={e => setInput(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && save()}
      />
      <span className="retention-unit">days</span>
      <button className="retention-save" onClick={save} disabled={status === 'saving'}>
        {status === 'saving' ? '…' : 'Save'}
      </button>
      {status && status !== 'saving' && <span className="retention-status">{status}</span>}
    </div>
  );
}

// ── Pipeline phase metadata ────────────────────────────────────────────────
const PHASE_META = {
  'process_match':    { num: 0, label: 'Process Reuse Check',    model: 'categorize' },
  'intent':           { num: 1, label: 'Intent Classification',  model: 'categorize' },
  'context_manifest': { num: 2, label: 'Context Manifest',       model: 'free'       },
  'context_fetch':    { num: 3, label: 'Context Selection Loop', model: 'categorize' },
  'node_selection':   { num: 4, label: 'Node Selection',         model: 'categorize' },
  'process_design':   { num: 5, label: 'Process Design',         model: 'reason'     },
  'process_result':   { num: 6, label: 'Execute',                model: 'free'       },
  'completion_check': { num: 7, label: 'Completion Check',       model: 'categorize' },
  'response':         { num: 8, label: 'Synthesize',             model: 'chat'       },
  'judge':            { num: null, label: 'Quality Judge',       model: 'categorize' },
  'error':            { num: null, label: 'Error',               model: null         },
  'reaction':         { num: null, label: 'User Reaction',       model: null         },
  'start':            { num: null, label: 'Start',               model: null         },
};

const MODEL_CHIP = {
  'free':       { label: 'local',      bg: 'var(--paper-3)',  fg: 'var(--muted)'   },
  'categorize': { label: 'categorize', bg: '#1E3A5F',         fg: '#A8C8F0'        },
  'reason':     { label: 'reason',     bg: '#3A1E5F',         fg: '#C8A8F0'        },
  'chat':       { label: 'chat',       bg: '#1E3A26',         fg: '#90C898'        },
};

// Assign a phase label to each LLM call in order based on log entries
function assignCallPhases(entries, calls) {
  const phases = Array(calls.length).fill(null);
  let ci = 0;
  const pm = entries.find(e => e.type === 'process_match');
  if (pm) {
    if (ci < calls.length) phases[ci++] = 'Phase 0 — Process Reuse';
    if (pm.data.action === 'reuse') {
      if (ci < calls.length) phases[ci++] = 'Phase 8 — Synthesize';
      return phases;
    }
  }
  if (entries.find(e => e.type === 'intent') && ci < calls.length)
    phases[ci++] = 'Phase 1 — Intent Classification';
  const cf = entries.find(e => e.type === 'context_fetch');
  const rounds = cf?.data?.rounds ?? 0;
  for (let r = 0; r < rounds && ci < calls.length; r++)
    phases[ci++] = rounds > 1 ? `Phase 3 — Context Loop (round ${r+1})` : 'Phase 3 — Context Loop';
  if (entries.find(e => e.type === 'node_selection') && ci < calls.length)
    phases[ci++] = 'Phase 4 — Node Selection';
  const designs = entries.filter(e => e.type === 'process_design');
  const checks  = entries.filter(e => e.type === 'completion_check');
  for (let i = 0; i < designs.length; i++) {
    const sfx = designs.length > 1 ? ` (${i+1}/${designs.length})` : '';
    if (ci < calls.length) phases[ci++] = `Phase 5 — Process Design${sfx}`;
    if (i < checks.length && ci < calls.length) phases[ci++] = `Phase 7 — Completion Check${sfx}`;
  }
  if (entries.find(e => e.type === 'response') && ci < calls.length)
    phases[ci++] = 'Phase 8 — Synthesize';
  if (ci < calls.length) phases[ci++] = 'Judge';
  return phases;
}

function PhaseSummary({ type, data }) {
  const tag = (text, color) => (
    <span className="phase-tag" style={color ? {background:color,color:'#fff'} : {}}>{text}</span>
  );
  switch (type) {
    case 'process_match':
      return (
        <div className="phase-summary">
          {tag(data.action === 'reuse' ? 'reuse' : 'custom', data.action === 'reuse' ? 'var(--sage)' : null)}
          {data.process_key && <span className="phase-dim mono">{data.process_key}</span>}
          {data.reasoning && <span className="phase-dim">{String(data.reasoning).slice(0, 120)}</span>}
        </div>
      );
    case 'intent':
      return (
        <div className="phase-summary">
          {tag(data.actionType)}
          {(data.entityTypes || []).map(t => <span key={t} className="phase-tag phase-tag-type">{t}</span>)}
          {data.timeframe && data.timeframe !== 'any' && tag(data.timeframe)}
          {data.confidence != null && <span className="phase-dim">{Math.round(data.confidence * 100)}% confidence</span>}
          {data.summary && <div className="phase-note">{data.summary}</div>}
        </div>
      );
    case 'context_manifest':
      return (
        <div className="phase-summary">
          <span className="phase-dim">{data.totalEntities} entities</span>
          {(data.types || []).map(t => (
            <span key={t.type} className="phase-tag">{t.type} <span className="phase-tag-count">{t.count}</span></span>
          ))}
        </div>
      );
    case 'context_fetch':
      return (
        <div className="phase-summary">
          <span className="phase-dim">{data.rounds} round{data.rounds !== 1 ? 's' : ''}</span>
          <span className="phase-dim">{data.entityCount} entities</span>
          {(data.fetchedTypes || []).map(t => <span key={t} className="phase-tag phase-tag-type">{t}</span>)}
          {data.summary && <div className="phase-note">{data.summary}</div>}
        </div>
      );
    case 'node_selection':
      return (
        <div className="phase-summary">
          {data.reasoning && <div className="phase-note">{String(data.reasoning).slice(0, 100)}</div>}
          <div style={{marginTop:4,display:'flex',flexWrap:'wrap',gap:3}}>
            {(data.nodes || []).map(n => <span key={n} className="phase-tag phase-tag-node mono">{n}</span>)}
          </div>
        </div>
      );
    case 'process_design':
      return (
        <div className="phase-summary">
          {data.iteration > 1 && tag(`iter ${data.iteration}`)}
          {data.reasoning && <span className="phase-dim">{String(data.reasoning).slice(0, 140)}</span>}
        </div>
      );
    case 'process_result': {
      const hasError = data.results && data.results._error;
      return (
        <div className="phase-summary">
          {data.iteration > 1 && tag(`iter ${data.iteration}`)}
          {data.source === 'reuse' && tag('reused process')}
          {hasError
            ? <span style={{color:'var(--oxblood)'}}>{String(data.results._error).slice(0, 120)}</span>
            : <span style={{color:'var(--sage)'}}>success</span>}
        </div>
      );
    }
    case 'completion_check':
      return (
        <div className="phase-summary">
          {data.iteration > 1 && tag(`iter ${data.iteration}`)}
          {tag(data.status, data.status === 'complete' ? 'var(--sage)' : 'var(--gold)')}
          {data.remaining && <span className="phase-dim">{String(data.remaining).slice(0, 100)}</span>}
        </div>
      );
    case 'response':
      return data.response
        ? <div className="phase-note">{String(data.response).slice(0, 240)}{String(data.response).length > 240 ? '…' : ''}</div>
        : null;
    case 'judge':
      return (
        <div className="phase-summary">
          {tag(data.achieved ? 'achieved' : 'not achieved', data.achieved ? 'var(--sage)' : 'var(--oxblood)')}
          {data.confidence != null && <span className="phase-dim">{Math.round(data.confidence * 100)}% confidence</span>}
          {data.reasoning && <div className="phase-note">{data.reasoning}</div>}
        </div>
      );
    case 'error':
      return <div className="phase-note" style={{color:'var(--oxblood)'}}>{String(data.message)}</div>;
    case 'reaction':
      return <div className="phase-summary">{tag(data.reaction, data.reaction === 'positive' ? 'var(--sage)' : 'var(--oxblood)')}</div>;
    default:
      return null;
  }
}

function PhaseRow({ entry, startTs, iterCount }) {
  const [open, setOpen] = React.useState(false);
  const meta = PHASE_META[entry.type];
  if (!meta) return null;

  const chip = meta.model ? MODEL_CHIP[meta.model] : null;
  const elapsedMs = startTs ? new Date(entry.ts).getTime() - startTs : 0;
  const elapsedStr = elapsedMs > 0 ? `+${(elapsedMs / 1000).toFixed(1)}s` : '';
  const hasNum = meta.num != null;

  return (
    <div className="phase-row">
      <div className="phase-left">
        {hasNum
          ? <div className="phase-num">{meta.num}</div>
          : <div className="phase-num phase-num-dot">·</div>}
        <div className="phase-line" />
      </div>
      <div className="phase-right">
        <div className="phase-header" onClick={() => setOpen(o => !o)}>
          <span className="phase-label">{meta.label}{iterCount > 1 ? ` (iter ${entry.data?.iteration ?? ''})` : ''}</span>
          {chip && (
            <span className="phase-model-chip" style={{background: chip.bg, color: chip.fg}}>{chip.label}</span>
          )}
          {elapsedStr && <span className="phase-elapsed mono">{elapsedStr}</span>}
          <span className="phase-toggle">{open ? '▾' : '▸'}</span>
        </div>
        <PhaseSummary type={entry.type} data={entry.data || {}} />
        {open && (
          <pre className="phase-raw">{JSON.stringify(entry.data, null, 2)}</pre>
        )}
      </div>
    </div>
  );
}

function CallRow({ call, index, phase }) {
  const [open, setOpen] = React.useState(false);
  const [copied, setCopied] = React.useState(false);
  const prompt = call.prompt;
  const msgs = prompt?.messages ?? [];

  function handleCopy(e) {
    e.stopPropagation();
    const parts = [];
    if (prompt?.system) parts.push(`=== SYSTEM ===\n${prompt.system}`);
    for (const m of msgs) parts.push(`=== ${m.role.toUpperCase()} ===\n${String(m.content)}`);
    if (call.response != null) parts.push(`=== RESPONSE ===\n${String(call.response)}`);
    navigator.clipboard.writeText(parts.join('\n\n')).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    }).catch(() => {});
  }

  return (
    <div className="call-row">
      <div className="call-row-header" onClick={() => setOpen(o => !o)}>
        <span className="call-index mono">#{index + 1}</span>
        {phase && <span className="call-phase-label">{phase}</span>}
        <span className="call-model mono">{call.model}</span>
        <span className="call-tokens mono">{Number(call.inputTokens).toLocaleString()} in / {Number(call.outputTokens).toLocaleString()} out</span>
        <span className="call-cost mono">${Number(call.costUsd).toFixed(4)}</span>
        <button className={`call-copy-btn${copied ? ' copied' : ''}`} onClick={handleCopy} title="Copy system, prompt &amp; response">{copied ? '✓ Copied' : 'Copy'}</button>
        <span className="call-toggle">{open ? '▾' : '▸'}</span>
      </div>
      {open && (
        <div className="call-detail">
          {prompt?.system && (
            <div className="call-section">
              <div className="call-section-label">System prompt <span className="call-chars">({prompt.system.length.toLocaleString()} chars)</span></div>
              <pre className="call-pre">{prompt.system}</pre>
            </div>
          )}
          {msgs.length > 0 && (
            <div className="call-section">
              <div className="call-section-label">Messages ({msgs.length})</div>
              {msgs.map((m, i) => (
                <div key={i} className={`call-msg call-msg-${m.role}`}>
                  <div className="call-msg-role">{m.role}</div>
                  <pre className="call-pre call-pre-msg">{String(m.content)}</pre>
                </div>
              ))}
            </div>
          )}
          {call.response != null && (
            <div className="call-section">
              <div className="call-section-label">Response <span className="call-chars">({String(call.response).length.toLocaleString()} chars)</span></div>
              <pre className="call-pre call-pre-response">{call.response}</pre>
            </div>
          )}
          {!prompt && call.response == null && (
            <div style={{color:'var(--muted)',fontSize:'12px',padding:'8px 0'}}>No prompt/response data — this call predates call-level tracking.</div>
          )}
        </div>
      )}
    </div>
  );
}

function ChatDetail({ detail, onBack }) {
  const start   = detail.entries.find(e => e.type === 'start');
  const summary = detail.entries.find(e => e.type === 'summary');
  const calls   = summary?.data?.calls ?? [];
  const startTs = start ? new Date(start.ts).getTime() : null;

  const phaseLabels = assignCallPhases(detail.entries, calls);

  // Count iterations for process_design/process_result to show iter suffix conditionally
  const iterCounts = {};
  for (const e of detail.entries) {
    iterCounts[e.type] = (iterCounts[e.type] ?? 0) + 1;
  }

  const pipelineEntries = detail.entries.filter(e =>
    e.type !== 'summary' && e.type !== 'start'
  );

  return (
    <div className="analytics-wrap">
      <button className="back-btn" onClick={onBack}>← Back</button>
      <div className="detail-title">Chat: <span className="mono">{detail.chatId}</span></div>

      {start && (
        <div className="detail-section">
          <div className="detail-label">User input</div>
          <div className="detail-value">{start.data.userInput}</div>
          <div className="detail-time">{new Date(start.ts).toLocaleString()}</div>
        </div>
      )}

      <div className="detail-section">
        <div className="detail-label">Pipeline</div>
        <div className="pipeline-timeline">
          {pipelineEntries.map((e, i) => (
            <PhaseRow key={i} entry={e} startTs={startTs} iterCount={iterCounts[e.type] ?? 1} />
          ))}
        </div>
      </div>

      {calls.length > 0 && (
        <div className="detail-section">
          <div className="detail-label">
            LLM calls — {calls.length} calls · {Number(summary?.data?.inputTokens ?? 0).toLocaleString()} in / {Number(summary?.data?.outputTokens ?? 0).toLocaleString()} out · ${Number(summary?.data?.estimatedCostUsd ?? 0).toFixed(4)} total
          </div>
          <div className="calls-list">
            {calls.map((c, i) => <CallRow key={i} call={c} index={i} phase={phaseLabels[i]} />)}
          </div>
        </div>
      )}
      {calls.length === 0 && summary == null && (
        <div className="detail-section">
          <div className="detail-label">Token data</div>
          <div style={{color:'var(--muted)',fontSize:'13px'}}>No token summary — this chat predates token tracking.</div>
        </div>
      )}
    </div>
  );
}

        windowDaysPast: parseInt(calPast, 10) || 14,

function parsePhBlocks(text) {
  // Match ```ph:name params\n...content...\n``` blocks
  const RE = /```ph:([^\s`]+)([ \t][^\n]*)?\n([\s\S]*?)```/g;
  const segments = [];
  let last = 0;
  let m;
  while ((m = RE.exec(text)) !== null) {
    if (m.index > last) segments.push({ type: 'text', content: text.slice(last, m.index) });
    const name = m[1];
    const paramStr = (m[2] || '').trim();
    const params = {};
    for (const part of paramStr.match(/\S+=\S+/g) || []) {
      const eq = part.indexOf('=');
      params[part.slice(0, eq)] = part.slice(eq + 1);
    }
    segments.push({ type: 'component', name, params });
    last = m.index + m[0].length;
  }
  if (last < text.length) segments.push({ type: 'text', content: text.slice(last) });
  return segments;
}

function useEntityFetch(url) {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => {
    if (!url) { setLoading(false); return; }
    setLoading(true);
    fetch(url)
      .then(r => r.ok ? r.json() : null)
      .then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, [url]);
  return { data, loading };
}

function PhShell({ label, loading, children }) {
  return (
    <div className="ph-component">
      <div className="ph-header">
        <span className="ph-header-label">{label}</span>
        {loading && <span className="ph-loading-text">Loading…</span>}
      </div>
      {!loading && <div className="ph-body">{children}</div>}
    </div>
  );
}

function PhTasks({ params }) {
  const { filter, ids } = params;
  const [tasks, setTasks] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    if (ids) {
      const idList = ids.split(',').map(s => s.trim()).filter(Boolean);
      Promise.all(idList.map(id =>
        fetch(`/api/entities/task/${id}`).then(r => r.ok ? r.json() : null).catch(() => null)
      )).then(res => { setTasks(res.filter(Boolean)); setLoading(false); });
    } else {
      let url = '/api/entities/task';
      if (filter === 'overdue') url += '?due=overdue';
      else if (filter === 'today') url += '?due=today';
      else if (filter === 'open') url += '?status=open';
      fetch(url).then(r => r.ok ? r.json() : [])
        .then(d => { setTasks(Array.isArray(d) ? d : []); setLoading(false); })
        .catch(() => setLoading(false));
    }
  }, [params.filter, params.ids]);

  const today = new Date().toISOString().slice(0, 10);
  const priorityColor = { low: 'var(--muted)', medium: 'var(--gold)', high: 'var(--oxblood)', critical: 'var(--oxblood)' };
  const statusColor   = { open: 'var(--muted)', 'in-progress': 'var(--gold)', done: 'var(--sage)' };
  const label = filter === 'overdue' ? 'Overdue Tasks' : filter === 'today' ? "Today's Tasks" : 'Tasks';

  return (
    <PhShell label={label} loading={loading}>
      {tasks.length === 0
        ? <div className="ph-empty">No tasks found</div>
        : tasks.map(t => {
            const meta = t.meta || {};
            const title = meta.title || t.id;
            const status = meta.status || 'open';
            const priority = meta.priority;
            const due = meta.dueDate;
            const overdue = due && due < today && status !== 'done';
            return (
              <div key={t.id} className="ph-task-row">
                <span className="ph-dot" style={{ background: statusColor[status] || 'var(--muted)' }} />
                <span className="ph-task-title">{title}</span>
                {priority && <span className="ph-badge" style={{ color: priorityColor[priority] || 'var(--muted)' }}>{priority}</span>}
                {due && <span className="ph-badge" style={{ color: overdue ? 'var(--oxblood)' : 'var(--muted)' }}>{due}</span>}
              </div>
            );
          })
      }
    </PhShell>
  );
}

const AVATAR_BG = ['#1E3A5F', '#3A1E5F', '#1E3A26', '#5F3A1E', '#3A1E1E'];
function avatarBg(name) {
  let h = 0;
  for (const c of String(name)) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return AVATAR_BG[h % AVATAR_BG.length];
}
function phInitials(name) {
  return String(name).split(/\s+/).map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
}

function PhTimeline({ params }) {
  const anchor = params.anchor || new Date().toISOString().slice(0, 10);
  const days   = Math.min(14, Math.max(1, parseInt(params.days || '3', 10)));
  const { data, loading } = useEntityFetch('/api/calendar');
  const items = Array.isArray(data) ? data : [];
  const today = new Date().toISOString().slice(0, 10);

  const buckets = React.useMemo(() => {
    const out = [];
    for (let d = 0; d < days; d++) {
      const dt = new Date(anchor + 'T12:00:00');
      dt.setDate(dt.getDate() + d);
      const dateStr = dt.toISOString().slice(0, 10);
      const dayLabel = d === 0 ? 'Today' : d === 1 ? 'Tomorrow'
        : dt.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
      const dayItems = items
        .filter(it => (it.date || '').slice(0, 10) === dateStr)
        .sort((a, b) => String(a.date).localeCompare(String(b.date)));
      out.push({ dateStr, dayLabel, dayItems });
    }
    return out;
  }, [data, anchor, days]);

  const label = `${days}-Day Schedule`;

  return (
    <PhShell label={label} loading={loading}>
      {buckets.map(({ dateStr, dayLabel, dayItems }) => (
        <div key={dateStr} className="ph-tl-day">
          <div className="ph-tl-day-label">
            {dayLabel}
            <span className="ph-tl-date"> · {dateStr}</span>
            {dateStr === today && <span className="ph-tl-today-badge">today</span>}
          </div>
          {dayItems.length === 0
            ? <div className="ph-tl-empty">Nothing scheduled</div>
            : dayItems.map((it, i) => {
                const hasTime = (it.date || '').includes('T');
                const timeStr = hasTime
                  ? new Date(it.date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
                  : null;
                const isTask = it.entityType === 'task';
                const overdue = isTask && it.overduable && (it.date || '').slice(0, 10) < today && it.meta?.status !== 'done';
                return (
                  <div key={i} className={`ph-tl-item${overdue ? ' ph-tl-overdue' : ''}`}>
                    <span className="ph-dot ph-dot-sm" style={{ background: isTask ? 'var(--gold)' : 'var(--ink-3)' }} />
                    {timeStr && <span className="ph-tl-time mono">{timeStr}</span>}
                    <span className="ph-tl-title">{it.title}</span>
                    {overdue && <span className="ph-badge" style={{ color: 'var(--oxblood)' }}>overdue</span>}
                  </div>
                );
              })
          }
        </div>
      ))}
    </PhShell>
  );
}

function PhCalendar({ params }) {
  const today = new Date().toISOString().slice(0, 10);
  const month = params.month || today.slice(0, 7);
  const { data, loading } = useEntityFetch('/api/calendar');
  const items = Array.isArray(data) ? data : [];

  const [year, mon] = month.split('-').map(Number);
  const firstDow = (new Date(year, mon - 1, 1).getDay() + 6) % 7; // Mon=0
  const daysInMonth = new Date(year, mon, 0).getDate();
  const monthLabel = new Date(year, mon - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const eventsByDate = React.useMemo(() => {
    const m = new Map();
    for (const it of items) {
      const d = (it.date || '').slice(0, 10);
      if (!d.startsWith(month)) continue;
      if (!m.has(d)) m.set(d, []);
      m.get(d).push(it);
    }
    return m;
  }, [data, month]);

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(mon).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({ d, ds, its: eventsByDate.get(ds) || [] });
  }
  while (cells.length % 7 !== 0) cells.push(null);

  return (
    <PhShell label={monthLabel} loading={loading}>
      <div className="ph-cal">
        <div className="ph-cal-head">
          {['Mo','Tu','We','Th','Fr','Sa','Su'].map(d => <div key={d} className="ph-cal-dh">{d}</div>)}
        </div>
        <div className="ph-cal-grid">
          {cells.map((cell, i) => {
            if (!cell) return <div key={i} className="ph-cal-cell ph-cal-empty" />;
            const isToday = cell.ds === today;
            return (
              <div key={i} className={`ph-cal-cell${isToday ? ' ph-cal-today' : ''}`} title={cell.its.map(x => x.title).join(', ')}>

function PhComponent({ name, params }) {

    default: return <div className="ph-unknown">Unknown component: ph:{name}</div>;
  }
}

function MessageBody({ text }) {
  const segments = React.useMemo(() => parsePhBlocks(text || ''), [text]);
  if (!segments.some(s => s.type === 'component')) {
    return <div className="md" dangerouslySetInnerHTML={{ __html: marked.parse(text || '') }} />;
  }
  return (
    <div>
      {segments.map((seg, i) => {
        if (seg.type === 'text') {
          const html = marked.parse(seg.content || '');
          if (!html.trim()) return null;
          return <div key={i} className="md" dangerouslySetInnerHTML={{ __html: html }} />;
        }
        return <PhComponent key={i} name={seg.name} params={seg.params} />;
      })}
    </div>
  );
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || null;

function Composer({ input, setInput, onSend, micActive, setMicActive }) {
  const taRef = useRef(null);
  const recogRef = useRef(null);

  useEffect(() => {
    const ta = taRef.current;
    if (!ta) return;
    ta.style.height = "auto";
    ta.style.height = Math.min(160, ta.scrollHeight) + "px";
  }, [input]);

  const handleMic = () => {
    if (!SpeechRecognition) return;
    if (micActive) {
      recogRef.current && recogRef.current.stop();
      return;
    }
    const recog = new SpeechRecognition();
    recog.lang = "en-US";
    recog.continuous = false;
    recog.interimResults = true;
    recogRef.current = recog;
    let finalTranscript = "";
    recog.onstart = () => { setMicActive(true); setInput(""); };
    recog.onresult = (e) => {
      finalTranscript = "";
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalTranscript += t;
        else interim += t;
      }
      setInput(finalTranscript || interim);
    };
    recog.onend = () => {
      setMicActive(false);
      if (finalTranscript) setTimeout(onSend, 50);
    };
    recog.onerror = (e) => {
      setMicActive(false);
      if (e.error !== "aborted" && e.error !== "no-speech") console.warn("Speech recognition error:", e.error);
    };
    recog.start();
  };

  return (
    <footer className="composer">
      <button
        className={`mic ${micActive ? "on" : ""} ${!SpeechRecognition ? "hidden" : ""}`}
        onClick={handleMic}
        aria-label={micActive ? "Stop listening" : "Start voice"}
        title={micActive ? "Listening — click to stop" : "Voice input"}
      >
        {micActive ? (
          <Waveform />
        ) : (
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6">
            <rect x="9" y="3" width="6" height="12" rx="3"/>
            <path d="M5 11 a7 7 0 0 0 14 0"/>
            <path d="M12 18 V22"/>
            <path d="M9 22 H15"/>
          </svg>
        )}
      </button>

      <div className="field">
        <textarea
          ref={taRef}
          rows={1}
          placeholder={micActive ? "Listening..." : "Message — or press Enter to send"}
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              onSend();
            }
          }}
        />
        <div className="field-tools">
          <span className="flex-1" />
          <span className="kbd mono">↵</span>
          <button className="send" onClick={onSend} disabled={!input.trim()} aria-label="Send">
            Send
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M2 6 H10 M7 3 L10 6 L7 9"/></svg>
          </button>
        </div>
      </div>
    </footer>
  );
}

function Waveform() {
  return (
    <span className="wave" aria-hidden>
      {[0,1,2,3,4].map((i) => <i key={i} style={{animationDelay: `${i * 0.11}s`}} />)}

}

      /* Settings tab */

      .people-list::-webkit-scrollbar, .person-detail::-webkit-scrollbar, .settings-body::-webkit-scrollbar { width: 8px; }

      .chat-head {

      .chip {

      .bubble {

        line-height: 1.55;

      .bubble.ai {
        background: var(--paper-2);
        color: var(--ink);

        border-top-left-radius: 2px;

      .bubble.user {

        font-family: var(--font-mono);

        padding-top: 8px;

        font-size: 10.5px;

        display: flex; flex-wrap: wrap; gap: 5px;

      }
