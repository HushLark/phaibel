        font-size: 11px;
        color: var(--sage);
        background: color-mix(in oklab, var(--sage) 12%, var(--paper));
        border: 1px solid color-mix(in oklab, var(--sage) 30%, var(--line));
        border-radius: var(--radius-sm);
        padding: 3px 7px;
      }

      .meta-ai, .meta-user {
        font-size: 10.5px;
        color: var(--muted-2);
        display: flex;
        align-items: center;
        gap: 6px;
        padding-left: 2px;
      }
      .meta-ai .dim { color: var(--paper-3); }
      .meta-btn {
        background: none; border: 0; padding: 0;
        cursor: pointer;
        color: var(--muted);
        font-family: inherit;
        font-size: inherit;
        display: inline-flex; align-items: center; gap: 3px;
      }
      .meta-btn:hover { color: var(--gold); }

      .pin-action-row {
        display: flex;
        gap: 6px;
        margin-top: 2px;
      }
      .pin-action {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px 4px 8px;
        border: 1px solid var(--line);
        background: var(--paper);
        border-radius: 999px;
        font-family: inherit;
        font-size: 11.5px;
        color: var(--ink-3);
        cursor: pointer;
        transition: border-color .12s ease, background .12s ease, color .12s ease;
      }
      .pin-action:hover:not(:disabled) {
        border-color: var(--gold);
        color: var(--ink);
        background: color-mix(in oklab, var(--gold-soft) 18%, var(--paper));
      }
      .pin-action.pinned {
        border-color: color-mix(in oklab, var(--gold) 45%, var(--line));
        background: color-mix(in oklab, var(--gold-soft) 25%, var(--paper));
        color: var(--ink);
        cursor: default;
      }
      .pin-action.ghost { color: var(--muted); }
      .pin-action:disabled { opacity: 0.9; }
      .pin-emoji {
        font-size: 12px;
        line-height: 1;
        display: inline-block;
        transform: translateY(-0.5px);
      }

      /* Composer */
      .composer {
        display: flex;
        gap: 10px;
        padding: 14px 28px 20px;
        border-top: 1px solid var(--line);
        background: var(--paper);
        align-items: flex-end;
      }
      .mic {
        flex: 0 0 42px;
        width: 42px;
        min-height: 42px;
        border-radius: var(--radius);
        background: var(--paper-2);
        border: 1px solid var(--line);
        color: var(--ink);
        cursor: pointer;
        display: grid; place-items: center;
        transition: background .15s ease, border-color .15s ease;
        align-self: flex-end;
      }
      .mic:hover { background: var(--paper); border-color: var(--gold-soft); }
      .mic.on {
        background: var(--oxblood);
        border-color: var(--oxblood);
        color: var(--paper);
      }
      .wave {
        display: inline-flex; gap: 2px; align-items: center; height: 16px;
      }
      .wave i {
        width: 2px; display: block;
        background: currentColor;
        border-radius: 1px;
        animation: wave 1s infinite ease-in-out;
      }
      @keyframes wave {
        0%, 100% { height: 3px; }
        50% { height: 14px; }
      }
      .wave i:nth-child(1) { height: 5px; }
      .wave i:nth-child(2) { height: 10px; }
      .wave i:nth-child(3) { height: 14px; }
      .wave i:nth-child(4) { height: 8px; }
      .wave i:nth-child(5) { height: 6px; }

      .field {
        flex: 1;
        border: 1px solid var(--line);
        background: var(--paper-2);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        transition: border-color .15s ease, background .15s ease;
      }
      .field:focus-within {
        border-color: var(--gold);
        background: var(--paper);
      }
      .field textarea {
        border: 0; background: transparent;
        font-family: inherit;
        font-size: 14px;
        line-height: 1.5;
        color: var(--ink);
        padding: 11px 14px 6px;
        resize: none;
        outline: none;
        min-height: 24px;
      }
      .field textarea::placeholder { color: var(--muted-2); }
      .field-tools {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 8px 8px;
      }
      .tool-btn {
        width: 24px; height: 24px;
        border: 0; background: transparent;
        cursor: pointer; color: var(--muted);
        border-radius: var(--radius-sm);
        display: grid; place-items: center;
      }
      .tool-btn:hover { color: var(--ink); background: var(--paper-3); }
      .flex-1 { flex: 1; }
      .kbd {
        font-size: 10px;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 3px;
        padding: 1px 5px;
        background: var(--paper);
      }
      .send {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 7px 14px;
        background: var(--ink);
        color: var(--paper);
        border: 1px solid var(--ink);
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 12.5px;
        font-weight: 500;
      }
      .send:disabled { opacity: 0.4; cursor: not-allowed; }
      .send:not(:disabled):hover { background: var(--ink-2); }

      /* Tweaks panel */
      .tweaks-panel {
        position: fixed;
        right: 20px; bottom: 20px;
        width: 280px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
        padding: 14px;
        z-index: 50;
        display: flex; flex-direction: column; gap: 14px;
      }
      .tweaks-panel header {
        display: flex; justify-content: space-between; align-items: center;
      }
      .tweak-grp { display: flex; flex-direction: column; gap: 6px; }
      .tweak-grp label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .seg {
        display: flex; gap: 2px;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 2px;
        background: var(--paper-2);
      }
      .seg.col { flex-direction: column; }
      .seg button {
        flex: 1;
        border: 0; background: transparent;
        padding: 6px 10px;
        font-size: 11.5px;
        color: var(--ink-3);
        cursor: pointer;
        border-radius: var(--radius-sm);
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        text-transform: capitalize;
        font-family: inherit;
      }
      .seg button.on {
        background: var(--ink);
        color: var(--paper);
      }
      .swatch {
        width: 10px; height: 10px;
        border-radius: 50%;
        border: 1px solid rgba(0,0,0,.15);
      }
      .sw-navy { background: #0E1B2C; }
      .sw-charcoal { background: #1C1E22; }
      .sw-forest { background: #15291E; }
      input[type=range] {
        accent-color: var(--gold);
      }

      /* Scrollbars */
      .thread::-webkit-scrollbar, .pin-list::-webkit-scrollbar { width: 8px; }
      .thread::-webkit-scrollbar-thumb, .pin-list::-webkit-scrollbar-thumb {
        background: color-mix(in oklab, var(--muted-2) 40%, transparent);
        border-radius: 8px;
      }
      .thread::-webkit-scrollbar-track, .pin-list::-webkit-scrollbar-track { background: transparent; }

      .mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }

      @media (max-width: 1100px) {
        .app { grid-template-columns: minmax(320px, 36%) 1fr; }
      }

      /* ── Analytics tab ─────────────────────────────────────────────── */
      .analytics-wrap { padding: 20px; overflow-y: auto; height: 100%; }
      .analytics-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .analytics-title { margin: 0; font-size: 15px; font-weight: 600; }
      .period-picker { display: flex; gap: 4px; }
      .period-picker button { padding: 4px 10px; border: 1px solid var(--line); border-radius: var(--radius); background: none; cursor: pointer; font-size: 12px; color: var(--muted); }
      .period-picker button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
      .retention-row { display: flex; align-items: center; gap: 7px; padding: 8px 0 10px; border-bottom: 1px solid var(--line); margin-bottom: 12px; flex-wrap: wrap; }
      .retention-label { font-size: 12px; color: var(--muted); }
      .retention-input { width: 52px; padding: 3px 6px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--paper); font-size: 12px; color: var(--ink); text-align: right; }
      .retention-input:focus { outline: none; border-color: var(--ink-3); }
      .retention-unit { font-size: 12px; color: var(--muted); }
      .retention-save { padding: 3px 10px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: none; cursor: pointer; font-size: 12px; color: var(--ink); }
      .retention-save:hover { background: var(--paper-2); }
      .retention-save:disabled { opacity: .5; cursor: default; }
      .retention-status { font-size: 12px; color: var(--sage); }
      .chat-log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .chat-log-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
      .chat-log-table td { padding: 7px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
      .clickable-row:hover { background: var(--paper-2); cursor: pointer; }
      .input-snippet { max-width: 280px; color: var(--ink); }
      .empty-cell { color: var(--muted); padding: 20px 8px; }
      .loading-msg { color: var(--muted); font-size: 13px; padding: 8px 0; }
      .back-btn { background: none; border: 1px solid var(--line); border-radius: var(--radius); padding: 4px 10px; cursor: pointer; margin-bottom: 16px; font-size: 12px; color: var(--muted); }
      .back-btn:hover { border-color: var(--ink); color: var(--ink); }
      .detail-title { margin: 0 0 16px; font-size: 15px; font-weight: 600; }
      .detail-section { margin-bottom: 20px; }
      .detail-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
      .detail-value { font-size: 14px; }
      .detail-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
      .calls-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .calls-table th { text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--line); color: var(--muted); font-weight: 500; font-size: 11px; }
      .calls-table td { padding: 5px 8px; border-bottom: 1px solid var(--line); }
      .calls-table tfoot td { font-weight: 600; border-top: 2px solid var(--line); border-bottom: none; }
      .log-entry { display: flex; align-items: baseline; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--line); font-size: 12px; flex-wrap: wrap; }
      .log-type { background: var(--paper-2); border-radius: var(--radius-sm); padding: 1px 6px; font-size: 11px; color: var(--ink-3); flex-shrink: 0; }
      .log-ts { color: var(--muted-2); font-size: 11px; }
      .log-body { width: 100%; color: var(--muted); font-size: 12px; margin-top: 2px; line-height: 1.4; }

      /* ── Pipeline timeline ─────────────────────────────────────────── */
      .pipeline-timeline { display: flex; flex-direction: column; }
      .phase-row { display: flex; gap: 0; min-height: 48px; }
      .phase-left { display: flex; flex-direction: column; align-items: center; width: 32px; flex-shrink: 0; }
      .phase-num { width: 22px; height: 22px; border-radius: 50%; background: var(--ink-3); color: var(--paper); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 10px; font-family: var(--font-mono); }
      .phase-num-dot { background: var(--paper-3); color: var(--muted); font-size: 14px; font-weight: 400; }
      .phase-line { flex: 1; width: 1px; background: var(--line); margin-top: 2px; margin-bottom: 0; }
      .phase-row:last-child .phase-line { display: none; }
      .phase-right { flex: 1; min-width: 0; padding: 8px 0 12px 10px; }
      .phase-header { display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; flex-wrap: wrap; }
      .phase-header:hover .phase-label { color: var(--ink); }
      .phase-label { font-size: 13px; font-weight: 600; color: var(--ink-2); }
      .phase-model-chip { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: var(--radius-sm); letter-spacing: .03em; text-transform: uppercase; }
      .phase-elapsed { font-size: 11px; color: var(--muted-2); }
      .phase-toggle { font-size: 11px; color: var(--muted-2); margin-left: auto; }
      .phase-summary { display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px; margin-top: 4px; }
      .phase-tag { display: inline-flex; align-items: center; gap: 3px; background: var(--paper-2); border-radius: var(--radius-sm); padding: 1px 6px; font-size: 11px; color: var(--ink-3); }
      .phase-tag-type { background: var(--ink-3); color: var(--paper-2); }
      .phase-tag-node { background: var(--paper-3); color: var(--ink); font-size: 10px; }
      .phase-tag-count { opacity: .65; font-size: 10px; }
      .phase-dim { font-size: 12px; color: var(--muted); }
      .phase-note { font-size: 12px; color: var(--muted); line-height: 1.45; margin-top: 3px; width: 100%; }
      .phase-raw { margin: 8px 0 0; padding: 10px 12px; background: var(--ink); color: var(--paper); font-family: var(--font-mono); font-size: 10px; line-height: 1.5; border-radius: var(--radius); white-space: pre-wrap; word-break: break-word; max-height: 260px; overflow-y: auto; }
      .call-phase-label { font-size: 11px; color: var(--muted); background: var(--paper-3); border-radius: var(--radius-sm); padding: 1px 6px; white-space: nowrap; }

      /* ── Call row drilldown ─────────────────────────────────────────── */
      .calls-list { display: flex; flex-direction: column; gap: 4px; }
      .call-row { border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
      .call-row-header { display: flex; align-items: center; gap: 12px; padding: 8px 12px; cursor: pointer; background: var(--paper-2); user-select: none; }
      .call-row-header:hover { background: var(--paper-3); }
      .call-copy-btn { margin-left: auto; padding: 2px 8px; font-size: 11px; background: transparent; border: 1px solid var(--line); border-radius: var(--radius-sm); color: var(--muted); cursor: pointer; transition: color .15s, border-color .15s, background .15s; }
      .call-copy-btn:hover { background: var(--paper-3); color: var(--ink); border-color: var(--muted-2); }
      .call-copy-btn.copied { color: var(--sage); border-color: var(--sage); }
      .call-index { color: var(--muted-2); font-size: 11px; min-width: 24px; }
      .call-model { font-size: 12px; color: var(--ink); flex: 1; }
      .call-tokens { font-size: 12px; color: var(--muted); }
      .call-cost { font-size: 12px; color: var(--ink); }
      .call-toggle { font-size: 11px; color: var(--muted); margin-left: 4px; }
      .call-detail { padding: 12px 14px; background: var(--paper); border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 14px; }
      .call-section { display: flex; flex-direction: column; gap: 6px; }
      .call-section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
      .call-chars { font-weight: 400; text-transform: none; letter-spacing: 0; }
      .call-pre { margin: 0; padding: 10px 12px; background: var(--ink); color: var(--paper); font-family: var(--font-mono); font-size: 11px; line-height: 1.5; border-radius: var(--radius); white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow-y: auto; }
      .call-pre-response { background: var(--ink-3); }
      .call-msg { display: flex; flex-direction: column; gap: 3px; }
      .call-msg-role { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
      .call-msg-user .call-msg-role { color: var(--gold); }
      .call-msg-assistant .call-msg-role { color: var(--sage); }
      .call-msg-system .call-msg-role { color: var(--muted); }
      .call-pre-msg { max-height: 200px; }

      /* ── ph: embedded UI components ────────────────────────────────── */
      .ph-component { margin: 10px 0; border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; background: var(--paper); }
      .ph-header { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--paper-2); border-bottom: 1px solid var(--line); }
      .ph-header-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
      .ph-loading-text { font-size: 11px; color: var(--muted-2); }
      .ph-body { }
      .ph-empty { padding: 12px; font-size: 13px; color: var(--muted); }
      .ph-unknown { padding: 8px 12px; font-size: 12px; color: var(--oxblood); font-family: var(--font-mono); }
      .ph-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
      .ph-dot-sm { width: 5px; height: 5px; margin-top: 6px; }
      .ph-badge { font-size: 10px; font-family: var(--font-mono); padding: 1px 5px; border-radius: var(--radius-sm); background: var(--paper-2); flex-shrink: 0; }

      /* Tasks */
      .ph-task-row { display: flex; align-items: baseline; gap: 7px; padding: 6px 12px; border-bottom: 1px solid var(--line); }
      .ph-task-row:last-child { border-bottom: none; }
      .ph-task-title { flex: 1; font-size: 13px; color: var(--ink); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* People */
      .ph-people-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px; }
      .ph-person-card { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 76px; text-align: center; }
      .ph-person-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--paper); flex-shrink: 0; }
      .ph-person-name { font-size: 11px; font-weight: 600; color: var(--ink); line-height: 1.25; word-break: break-word; }
      .ph-person-sub { font-size: 10px; color: var(--muted); line-height: 1.2; }
      .ph-person-rel { font-size: 9px; color: var(--muted-2); background: var(--paper-2); border-radius: var(--radius-sm); padding: 1px 4px; }

      /* Company */
      .ph-company-card { padding: 12px 14px; }
      .ph-company-name { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
      .ph-company-sub { font-size: 12px; color: var(--muted); }
      .ph-company-url { font-size: 11px; color: var(--muted-2); display: block; margin-top: 4px; text-decoration: none; }
      .ph-company-url:hover { color: var(--ink); text-decoration: underline; }

      /* Timeline */
      .ph-tl-day { padding: 8px 12px; border-bottom: 1px solid var(--line); }
      .ph-tl-day:last-child { border-bottom: none; }
      .ph-tl-day-label { font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
      .ph-tl-date { font-size: 10px; color: var(--muted-2); font-family: var(--font-mono); }
      .ph-tl-today-badge { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; background: var(--ink-3); color: var(--paper); border-radius: var(--radius-sm); padding: 1px 5px; margin-left: 5px; vertical-align: middle; }
      .ph-tl-empty { font-size: 12px; color: var(--muted-2); font-style: italic; margin-bottom: 2px; }
      .ph-tl-item { display: flex; align-items: baseline; gap: 7px; padding: 2px 0; font-size: 13px; }
      .ph-tl-time { font-family: var(--font-mono); color: var(--muted); font-size: 11px; flex-shrink: 0; min-width: 58px; }
      .ph-tl-title { color: var(--ink); flex: 1; }
      .ph-tl-overdue .ph-tl-title { color: var(--oxblood); }

      /* Calendar */
      .ph-cal { padding: 8px 10px 10px; }
      .ph-cal-head { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 3px; }
      .ph-cal-dh { font-size: 9px; font-weight: 700; color: var(--muted-2); text-align: center; padding: 2px 0; text-transform: uppercase; letter-spacing: .04em; }
      .ph-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
      .ph-cal-cell { min-height: 34px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 3px 1px; border-radius: var(--radius-sm); cursor: default; }
      .ph-cal-cell:not(.ph-cal-empty):hover { background: var(--paper-2); }
      .ph-cal-today { background: var(--ink-3) !important; border-radius: var(--radius-sm); }
      .ph-cal-today .ph-cal-day { color: var(--paper); font-weight: 700; }
      .ph-cal-day { font-size: 11px; color: var(--ink); line-height: 1; }
      .ph-cal-empty .ph-cal-day { opacity: 0; }
      .ph-cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
      .ph-cal-dot { width: 4px; height: 4px; border-radius: 50%; }
      .ph-cal-dot-event { background: var(--ink-3); }
      .ph-cal-dot-task  { background: var(--gold); }
      .ph-cal-more { font-size: 8px; color: var(--muted-2); }
    `}</style>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
